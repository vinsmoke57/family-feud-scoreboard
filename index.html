<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AEC Game Show - Light Theme</title>
    <!-- React & Babel Standalone setup -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- Modern Font -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;900&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --cyan: #24b59c;
            --yellow: #f8d13e;
            --bg: #f4f7fb;       /* Pleasant light blue/gray */
            --panel-bg: #ffffff;  /* Solid white panels */
            --border: #24b59c;
            --text-dark: #1e293b; /* Slate 800 */
        }

        body {
            background-color: var(--bg);
            background-image: 
                radial-gradient(circle at 50% 0%, rgba(36, 181, 156, 0.08) 0%, transparent 50%),
                radial-gradient(circle at 50% 100%, rgba(248, 209, 62, 0.12) 0%, transparent 50%);
            color: var(--text-dark);
            font-family: 'Outfit', sans-serif;
            margin: 0;
            padding: 0;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow-x: hidden;
        }

        * {
            box-sizing: border-box;
        }

        /* Magnet Logo Structure */
        .logo-wrapper {
            position: absolute;
            top: 30px;
            left: 30px;
            width: 140px;
            height: 140px;
            z-index: 50;
        }

        .logo-magnet {
            width: 100%;
            height: 100%;
            perspective: 1000px;
            /* Smooth springy transition when snapping back to position */
            transition: transform 0.15s cubic-bezier(0.2, 0.8, 0.2, 1);
        }

        .logo-inner {
            width: 100%;
            height: 100%;
            transform-style: preserve-3d;
            animation: rotate3DLogo 9s infinite linear;
        }

        @keyframes rotate3DLogo {
            0% { transform: rotateX(0deg) rotateY(0deg) rotateZ(0deg); }
            100% { transform: rotateX(360deg) rotateY(360deg) rotateZ(360deg); }
        }

        .logo-inner img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            filter: drop-shadow(0 10px 15px rgba(0, 0, 0, 0.15));
        }

        .layout-container {
            display: flex;
            justify-content: space-between;
            align-items: stretch;
            width: 95vw;
            max-width: 1400px;
            gap: 30px;
            position: relative;
            z-index: 10;
        }

        /* Scoreboard Panels - Light Theme */
        .team-panel {
            width: 25vw;
            max-width: 300px;
            display: flex;
            flex-direction: column;
            align-items: center;
            background: var(--panel-bg);
            border: 2px solid var(--border);
            border-radius: 20px;
            padding: 25px;
            box-shadow: 0 15px 35px rgba(36, 181, 156, 0.15);
        }

        .team-name {
            background: transparent;
            border: none;
            color: var(--cyan);
            font-size: 32px;
            font-family: inherit;
            font-weight: 900;
            text-align: center;
            text-transform: uppercase;
            width: 100%;
            margin-bottom: 25px;
            border-bottom: 3px solid rgba(36, 181, 156, 0.3);
            padding-bottom: 10px;
            transition: border-color 0.3s;
        }

        .team-name:focus {
            outline: none;
            border-bottom-color: var(--cyan);
        }

        .score-box {
            font-size: 90px;
            font-weight: 900;
            color: var(--text-dark);
            background: #f8fafc;
            width: 100%;
            text-align: center;
            border-radius: 12px;
            border: 4px solid var(--cyan);
            padding: 10px 0;
            margin-bottom: 25px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.05);
        }

        .controls {
            display: flex;
            gap: 15px;
            width: 100%;
        }

        .controls button {
            flex: 1;
            padding: 15px;
            font-size: 36px;
            font-weight: 900;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            background: #ffffff;
            border: 2px solid var(--cyan);
            color: var(--cyan);
            transition: all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 4px 6px rgba(36, 181, 156, 0.1);
        }

        .controls button:hover {
            background: var(--cyan);
            color: #ffffff;
            transform: scale(1.05);
            box-shadow: 0 8px 15px rgba(36, 181, 156, 0.3);
        }

        .controls button:active {
            transform: scale(0.95);
        }

        /* Main Game Board */
        .main-board {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 25px;
        }

        .question-box {
            background: #ffffff;
            border: 4px solid var(--yellow);
            padding: 25px 40px;
            border-radius: 16px;
            font-size: 32px;
            font-weight: 900;
            text-align: center;
            color: var(--text-dark);
            box-shadow: 0 10px 25px rgba(248, 209, 62, 0.25);
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .answers-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        /* 3D Flip Card Effect for Answers - Light Theme */
        .answer-card {
            width: 100%;
            height: 80px;
            perspective: 1000px;
            cursor: pointer;
        }

        .answer-inner {
            width: 100%;
            height: 100%;
            position: relative;
            transition: transform 0.6s cubic-bezier(0.4, 0.0, 0.2, 1);
            transform-style: preserve-3d;
        }

        .answer-card.revealed .answer-inner {
            transform: rotateX(180deg);
        }

        .answer-front, .answer-back {
            width: 100%;
            height: 100%;
            position: absolute;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            border-radius: 10px;
        }

        .answer-front {
            background: #ffffff;
            border: 2px solid rgba(36, 181, 156, 0.4);
            justify-content: center;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.05);
            transition: all 0.2s;
        }

        .answer-front:hover {
            background: rgba(36, 181, 156, 0.05);
            border-color: var(--cyan);
            box-shadow: 0 8px 15px rgba(36, 181, 156, 0.15);
        }

        .number-circle {
            font-size: 34px;
            font-weight: 900;
            color: var(--cyan);
            background: #ffffff;
            width: 50px;
            height: 50px;
            display: flex;
            justify-content: center;
            align-items: center;
            border-radius: 50%;
            border: 3px solid var(--cyan);
        }

        .answer-back {
            transform: rotateX(180deg);
            background: linear-gradient(135deg, var(--yellow) 0%, #e2b918 100%);
            color: var(--text-dark);
            justify-content: space-between;
            padding: 0 20px;
            border: 2px solid #ffffff;
            box-shadow: 0 8px 20px rgba(248, 209, 62, 0.3);
        }

        .answer-back .text {
            font-size: 26px;
            font-weight: 900;
            text-transform: uppercase;
        }

        .answer-back .points {
            background: #ffffff;
            color: var(--cyan);
            font-size: 30px;
            font-weight: 900;
            padding: 5px 20px;
            border-radius: 6px;
            border: 2px solid var(--cyan);
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const App = () => {
            // State for manual scoreboards
            const [team1Score, setTeam1Score] = useState(0);
            const [team2Score, setTeam2Score] = useState(0);
            
            // Magnet logo states
            const [magnetTransform, setMagnetTransform] = useState("translate(0px, 0px)");
            const logoRef = useRef(null);

            // You can edit the question and answers right here
            const currentQuestion = "Name a popular renewable energy source";
            
            const [answers, setAnswers] = useState([
                { id: 1, text: "Solar Power", points: 41, revealed: false },
                { id: 2, text: "Wind Energy", points: 32, revealed: false },
                { id: 3, text: "Hydropower", points: 15, revealed: false },
                { id: 4, text: "Geothermal", points: 8, revealed: false },
                { id: 5, text: "Biomass", points: 4, revealed: false },
                { id: 6, text: "-", points: 0, revealed: false },
                { id: 7, text: "-", points: 0, revealed: false },
                { id: 8, text: "-", points: 0, revealed: false }
            ]);

            // Magnet effect logic
            useEffect(() => {
                const handleMouseMove = (e) => {
                    if (!logoRef.current) return;
                    
                    const rect = logoRef.current.getBoundingClientRect();
                    // Find the un-moved center of the logo wrapper
                    const centerX = rect.left + rect.width / 2;
                    const centerY = rect.top + rect.height / 2;
                    
                    const distX = e.clientX - centerX;
                    const distY = e.clientY - centerY;
                    const distance = Math.sqrt(distX * distX + distY * distY);
                    
                    // The distance at which the magnet starts pulling (pixels)
                    const magnetRadius = 400; 
                    
                    if (distance < magnetRadius) {
                        // Math for a buttery-smooth pull that gets stronger as you get closer
                        const pullFactor = Math.pow((magnetRadius - distance) / magnetRadius, 1.5);
                        
                        // Maximum it can move is a fraction of the distance
                        const moveX = distX * pullFactor * 0.6; 
                        const moveY = distY * pullFactor * 0.6;
                        
                        setMagnetTransform(`translate(${moveX}px, ${moveY}px) scale(1.05)`);
                    } else {
                        setMagnetTransform("translate(0px, 0px) scale(1)");
                    }
                };

                window.addEventListener('mousemove', handleMouseMove);
                return () => window.removeEventListener('mousemove', handleMouseMove);
            }, []);

            // Keyboard shortcuts for scoring
            useEffect(() => {
                const handleKeyDown = (e) => {
                    // Ignore keydown if user is typing in the team name input
                    if (e.target.tagName.toLowerCase() === 'input') return;

                    switch(e.key.toLowerCase()) {
                        case 'q': setTeam1Score(s => s + 1); break;
                        case 'a': setTeam1Score(s => s - 1); break;
                        case 'p': setTeam2Score(s => s + 1); break;
                        case 'l': setTeam2Score(s => s - 1); break;
                    }
                };
                window.addEventListener('keydown', handleKeyDown);
                return () => window.removeEventListener('keydown', handleKeyDown);
            }, []);

            // Flip the card when clicked
            const toggleReveal = (index) => {
                const newAnswers = [...answers];
                newAnswers[index].revealed = !newAnswers[index].revealed;
                setAnswers(newAnswers);
            };

            return (
                <div>
                    {/* Magnetic Rotating Logo Wrapper */}
                    <div className="logo-wrapper" ref={logoRef}>
                        <div className="logo-magnet" style={{ transform: magnetTransform }}>
                            <div className="logo-inner">
                                <img src="./logo.png" alt="AEC Logo" />
                            </div>
                        </div>
                    </div>

                    <div className="layout-container">
                        {/* Team 1 Scoreboard */}
                        <div className="team-panel">
                            <input type="text" className="team-name" defaultValue="TEAM 1" />
                            <div className="score-box">{team1Score}</div>
                            <div className="controls">
                                <button onClick={() => setTeam1Score(s => s + 1)}>+</button>
                                <button onClick={() => setTeam1Score(s => s - 1)}>-</button>
                            </div>
                            <div style={{ marginTop: "15px", fontSize: "16px", color: "var(--cyan)", fontWeight: 700, opacity: 0.8 }}>
                                Keys: <strong style={{color:"var(--text-dark)"}}>Q</strong> (+) / <strong style={{color:"var(--text-dark)"}}>A</strong> (-)
                            </div>
                        </div>

                        {/* Game Board Center */}
                        <div className="main-board">
                            <div className="question-box">
                                {currentQuestion}
                            </div>
                            
                            <div className="answers-grid">
                                {answers.map((ans, idx) => (
                                    <div 
                                        key={ans.id} 
                                        className={`answer-card ${ans.revealed ? 'revealed' : ''}`} 
                                        onClick={() => toggleReveal(idx)}
                                    >
                                        <div className="answer-inner">
                                            {/* Closed state */}
                                            <div className="answer-front">
                                                <div className="number-circle">{idx + 1}</div>
                                            </div>
                                            
                                            {/* Revealed state */}
                                            <div className="answer-back">
                                                <span className="text">{ans.text}</span>
                                                <span className="points">{ans.points}</span>
                                            </div>
                                        </div>
                                    </div>
                                ))}
                            </div>
                        </div>

                        {/* Team 2 Scoreboard */}
                        <div className="team-panel">
                            <input type="text" className="team-name" defaultValue="TEAM 2" />
                            <div className="score-box">{team2Score}</div>
                            <div className="controls">
                                <button onClick={() => setTeam2Score(s => s + 1)}>+</button>
                                <button onClick={() => setTeam2Score(s => s - 1)}>-</button>
                            </div>
                            <div style={{ marginTop: "15px", fontSize: "16px", color: "var(--cyan)", fontWeight: 700, opacity: 0.8 }}>
                                Keys: <strong style={{color:"var(--text-dark)"}}>P</strong> (+) / <strong style={{color:"var(--text-dark)"}}>L</strong> (-)
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
