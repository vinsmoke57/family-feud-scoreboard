<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AEC Game Show</title>
    <!-- React & Babel Standalone setup -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- Modern Font -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;900&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --cyan: #24b59c;
            --yellow: #f8d13e;
            --bg: #0b0f19;
            --panel-bg: rgba(36, 181, 156, 0.05);
            --border: rgba(36, 181, 156, 0.4);
        }

        body {
            background-color: var(--bg);
            background-image: 
                radial-gradient(circle at 50% 0%, rgba(36, 181, 156, 0.15) 0%, transparent 50%),
                radial-gradient(circle at 50% 100%, rgba(248, 209, 62, 0.05) 0%, transparent 50%);
            color: white;
            font-family: 'Outfit', sans-serif;
            margin: 0;
            padding: 0;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow-x: hidden;
        }

        * {
            box-sizing: border-box;
        }

        /* 3D Rotating Logo Container */
        .logo-container {
            position: absolute;
            top: 20px;
            left: 20px;
            width: 120px;
            height: 120px;
            perspective: 1000px;
            z-index: 50;
        }

        .logo-inner {
            width: 100%;
            height: 100%;
            transform-style: preserve-3d;
            animation: rotate3DLogo 8s infinite linear;
        }

        /* 3D full rotation effect */
        @keyframes rotate3DLogo {
            0% { transform: rotateX(0deg) rotateY(0deg) rotateZ(0deg); }
            100% { transform: rotateX(360deg) rotateY(360deg) rotateZ(360deg); }
        }

        .logo-inner img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            filter: drop-shadow(0 0 15px rgba(248, 209, 62, 0.6));
        }

        .layout-container {
            display: flex;
            justify-content: space-between;
            align-items: stretch;
            width: 95vw;
            max-width: 1400px;
            gap: 30px;
            position: relative;
            z-index: 10;
        }

        /* Scoreboard Panels */
        .team-panel {
            width: 25vw;
            max-width: 300px;
            display: flex;
            flex-direction: column;
            align-items: center;
            background: rgba(0, 0, 0, 0.5);
            border: 2px solid var(--border);
            border-radius: 20px;
            padding: 25px;
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.5), inset 0 0 20px rgba(36, 181, 156, 0.1);
            backdrop-filter: blur(10px);
        }

        .team-name {
            background: transparent;
            border: none;
            color: var(--yellow);
            font-size: 32px;
            font-family: inherit;
            font-weight: 900;
            text-align: center;
            text-transform: uppercase;
            width: 100%;
            margin-bottom: 25px;
            border-bottom: 3px solid var(--border);
            padding-bottom: 10px;
            transition: border-color 0.3s;
        }

        .team-name:focus {
            outline: none;
            border-bottom-color: var(--yellow);
        }

        .score-box {
            font-size: 90px;
            font-weight: 900;
            color: var(--cyan);
            text-shadow: 0 0 25px rgba(36, 181, 156, 0.8), 2px 2px 0px #000;
            background: #000;
            width: 100%;
            text-align: center;
            border-radius: 12px;
            border: 4px solid var(--cyan);
            padding: 10px 0;
            margin-bottom: 25px;
            box-shadow: inset 0 0 15px rgba(36, 181, 156, 0.5);
        }

        .controls {
            display: flex;
            gap: 15px;
            width: 100%;
        }

        .controls button {
            flex: 1;
            padding: 15px;
            font-size: 36px;
            font-weight: 900;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            background: rgba(36, 181, 156, 0.2);
            border: 2px solid var(--cyan);
            color: white;
            transition: all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .controls button:hover {
            background: var(--cyan);
            color: #000;
            transform: scale(1.05);
            box-shadow: 0 0 15px var(--cyan);
        }

        .controls button:active {
            transform: scale(0.95);
        }

        /* Main Game Board */
        .main-board {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 25px;
        }

        .question-box {
            background: rgba(0, 0, 0, 0.7);
            border: 3px solid var(--yellow);
            padding: 25px 40px;
            border-radius: 16px;
            font-size: 36px;
            font-weight: 900;
            text-align: center;
            color: white;
            box-shadow: 0 0 40px rgba(248, 209, 62, 0.2);
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .answers-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        /* 3D Flip Card Effect for Answers */
        .answer-card {
            width: 100%;
            height: 80px;
            perspective: 1000px;
            cursor: pointer;
        }

        .answer-inner {
            width: 100%;
            height: 100%;
            position: relative;
            transition: transform 0.6s cubic-bezier(0.4, 0.0, 0.2, 1);
            transform-style: preserve-3d;
        }

        .answer-card.revealed .answer-inner {
            transform: rotateX(180deg);
        }

        .answer-front, .answer-back {
            width: 100%;
            height: 100%;
            position: absolute;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            border: 2px solid var(--border);
            border-radius: 10px;
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.6);
        }

        .answer-front {
            background: linear-gradient(180deg, rgba(36, 181, 156, 0.25) 0%, rgba(36, 181, 156, 0.05) 100%);
            justify-content: center;
        }

        .answer-front:hover {
            background: linear-gradient(180deg, rgba(36, 181, 156, 0.35) 0%, rgba(36, 181, 156, 0.15) 100%);
            border-color: var(--cyan);
        }

        .number-circle {
            font-size: 34px;
            font-weight: 900;
            color: var(--yellow);
            background: rgba(0, 0, 0, 0.6);
            width: 50px;
            height: 50px;
            display: flex;
            justify-content: center;
            align-items: center;
            border-radius: 50%;
            border: 2px solid var(--yellow);
            box-shadow: 0 0 15px rgba(248, 209, 62, 0.4);
        }

        .answer-back {
            transform: rotateX(180deg);
            background: linear-gradient(180deg, var(--yellow) 0%, #d4b020 100%);
            color: #000;
            justify-content: space-between;
            padding: 0 20px;
            border-color: #fff;
            box-shadow: 0 0 25px rgba(248, 209, 62, 0.5);
        }

        .answer-back .text {
            font-size: 26px;
            font-weight: 900;
            text-transform: uppercase;
        }

        .answer-back .points {
            background: #000;
            color: var(--cyan);
            font-size: 32px;
            font-weight: 900;
            padding: 5px 20px;
            border-radius: 6px;
            border: 2px solid var(--cyan);
            box-shadow: inset 0 0 10px rgba(36, 181, 156, 0.5);
        }

    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState } = React;

        const App = () => {
            // State for manual scoreboards
            const [team1Score, setTeam1Score] = useState(0);
            const [team2Score, setTeam2Score] = useState(0);

            // You can edit the question and answers right here
            const currentQuestion = "Name a popular renewable energy source";
            
            const [answers, setAnswers] = useState([
                { id: 1, text: "Solar Power", points: 41, revealed: false },
                { id: 2, text: "Wind Energy", points: 32, revealed: false },
                { id: 3, text: "Hydropower", points: 15, revealed: false },
                { id: 4, text: "Geothermal", points: 8, revealed: false },
                { id: 5, text: "Biomass", points: 4, revealed: false },
                { id: 6, text: "-", points: 0, revealed: false },
                { id: 7, text: "-", points: 0, revealed: false },
                { id: 8, text: "-", points: 0, revealed: false }
            ]);

            // Flip the card when clicked
            const toggleReveal = (index) => {
                const newAnswers = [...answers];
                newAnswers[index].revealed = !newAnswers[index].revealed;
                setAnswers(newAnswers);
            };

            return (
                <div>
                    {/* Rotating Logo - Update the src attribute to map to your logo file */}
                    <div className="logo-container">
                        <div className="logo-inner">
                            <img src="./logo.png" alt="Custom Logo" />
                        </div>
                    </div>

                    <div className="layout-container">
                        {/* Team 1 Scoreboard */}
                        <div className="team-panel">
                            <input type="text" className="team-name" defaultValue="TEAM 1" />
                            <div className="score-box">{team1Score}</div>
                            <div className="controls">
                                <button onClick={() => setTeam1Score(s => s + 1)}>+</button>
                                <button onClick={() => setTeam1Score(s => Math.max(0, s - 1))}>-</button>
                            </div>
                        </div>

                        {/* Game Board Center */}
                        <div className="main-board">
                            <div className="question-box">
                                {currentQuestion}
                            </div>
                            
                            <div className="answers-grid">
                                {answers.map((ans, idx) => (
                                    <div 
                                        key={ans.id} 
                                        className={`answer-card ${ans.revealed ? 'revealed' : ''}`} 
                                        onClick={() => toggleReveal(idx)}
                                    >
                                        <div className="answer-inner">
                                            {/* Closed state showing number */}
                                            <div className="answer-front">
                                                <div className="number-circle">{idx + 1}</div>
                                            </div>
                                            
                                            {/* Revealed state showing answer + points */}
                                            <div className="answer-back">
                                                <span className="text">{ans.text}</span>
                                                <span className="points">{ans.points}</span>
                                            </div>
                                        </div>
                                    </div>
                                ))}
                            </div>
                        </div>

                        {/* Team 2 Scoreboard */}
                        <div className="team-panel">
                            <input type="text" className="team-name" defaultValue="TEAM 2" />
                            <div className="score-box">{team2Score}</div>
                            <div className="controls">
                                <button onClick={() => setTeam2Score(s => s + 1)}>+</button>
                                <button onClick={() => setTeam2Score(s => Math.max(0, s - 1))}>-</button>
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
