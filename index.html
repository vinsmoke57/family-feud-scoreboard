<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Family Feud Game</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Oswald:wght@400;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --primary: #24b59c;
    --primary-dark: #1a8a76;
    --primary-light: #d0f5ef;
    --secondary: #f8d13e;
    --secondary-dark: #c9a318;
    --secondary-light: #fef8d8;
    --red: #e53935;
    --red-bright: #ff1a1a;
    --bg: #f0faf8;
    --bg2: #ffffff;
    --text-dark: #0d2e29;
    --text-mid: #2a6b5f;
    --text-muted: #7ab8ae;
    --border: rgba(36,181,156,0.22);
    --shadow: 0 4px 24px rgba(36,181,156,0.13);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text-dark);
    font-family: 'Oswald', sans-serif;
    min-height: 100vh;
    overflow: hidden;
    position: relative;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: radial-gradient(circle, rgba(36,181,156,0.1) 1px, transparent 1px);
    background-size: 28px 28px;
    pointer-events: none;
    z-index: 0;
  }

  /* ===== LOGO 3D Spring ===== */
  #logo-spring {
    position: fixed;
    top: 12px;
    left: 14px;
    z-index: 9999;
    cursor: grab;
    user-select: none;
    transform-origin: center center;
    filter:
      drop-shadow(0 0 8px rgba(248,209,62,0.9))
      drop-shadow(0 0 18px rgba(36,181,156,0.75))
      drop-shadow(0 4px 20px rgba(0,0,0,0.35));
    transition: filter 0.2s;
    animation: logoGlowPulse 2.5s ease-in-out infinite alternate;
  }
/*  @keyframes logoGlowPulse {
    from { filter:
      drop-shadow(0 0 6px rgba(248,209,62,0.8))
      drop-shadow(0 0 14px rgba(36,181,156,0.6))
      drop-shadow(0 4px 18px rgba(0,0,0,0.3)); }
    to   { filter:
      drop-shadow(0 0 14px rgba(248,209,62,1.0))
      drop-shadow(0 0 28px rgba(36,181,156,0.95))
      drop-shadow(0 6px 24px rgba(0,0,0,0.4)); } */
  }
  #logo-spring:active { cursor: grabbing; animation: none; }
  #logo-spring svg { width: 72px; height: 72px; display: block; }

  /* ===== HEADER ===== */
  #header {
    text-align: center;
    padding: 14px 110px 6px;
    position: relative;
    z-index: 10;
  }

  #game-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(2.4rem, 5.5vw, 4.5rem);
    letter-spacing: 0.1em;
    color: var(--primary-dark);
    text-shadow: 3px 3px 0 rgba(36,181,156,0.18);
    cursor: pointer;
    outline: none;
    border: none;
    background: transparent;
    width: 100%;
    text-align: center;
    line-height: 1;
  }
  #game-title:focus { color: var(--primary); border-bottom: 2px solid var(--secondary); }

  #subtitle {
    font-size: 0.78rem;
    letter-spacing: 0.28em;
    color: var(--text-muted);
    text-transform: uppercase;
    margin-top: 2px;
  }

  #stage-wrap {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    margin-top: 5px;
  }
  .stage-btn {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1rem;
    letter-spacing: 0.15em;
    padding: 3px 18px;
    border-radius: 20px;
    border: 2px solid var(--primary);
    background: transparent;
    color: var(--text-muted);
    cursor: pointer;
    transition: all 0.2s;
  }
  .stage-btn.active {
    background: var(--primary);
    color: white;
    box-shadow: 0 2px 10px rgba(36,181,156,0.35);
  }
  .stage-label {
    font-size: 0.68rem;
    letter-spacing: 0.2em;
    color: var(--text-muted);
    text-transform: uppercase;
  }

  /* ===== MAIN LAYOUT ===== */
  #main {
    display: grid;
    grid-template-columns: 1fr 2.2fr 1fr;
    gap: 10px;
    padding: 6px 14px;
    height: calc(100vh - 108px);
    align-items: start;
    position: relative;
    z-index: 1;
  }

  /* ===== TEAM PANELS ===== */
  .team-panel {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
    padding: 16px 10px;
    border-radius: 16px;
    background: var(--bg2);
    border: 2px solid var(--border);
    box-shadow: var(--shadow);
  }
  .team-panel.left  { border-top: 4px solid var(--primary); }
  .team-panel.right { border-top: 4px solid var(--secondary); }

  .team-name-input {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(1.3rem, 2.2vw, 1.9rem);
    letter-spacing: 0.1em;
    text-align: center;
    background: transparent;
    border: none;
    border-bottom: 2px solid transparent;
    color: var(--text-dark);
    width: 100%;
    cursor: pointer;
    outline: none;
    transition: border-color 0.2s;
  }
  .team-panel.left  .team-name-input { color: var(--primary-dark); }
  .team-panel.right .team-name-input { color: var(--secondary-dark); }
  .team-name-input:focus { border-bottom-color: var(--secondary); cursor: text; }

  .score-display {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(3.5rem, 7vw, 6rem);
    line-height: 1;
    transition: transform 0.15s;
  }
  .team-panel.left  .score-display { color: var(--primary); }
  .team-panel.right .score-display { color: var(--secondary-dark); }
  .score-display.bump { transform: scale(1.22); }
  .score-display.negative { color: var(--red) !important; }

  .score-hint {
    font-size: 0.6rem;
    letter-spacing: 0.2em;
    color: var(--text-muted);
    text-transform: uppercase;
  }

  .buzzer-indicator {
    width: 15px; height: 15px;
    border-radius: 50%;
    background: rgba(0,0,0,0.06);
    border: 2px solid var(--border);
    transition: all 0.3s;
    margin-top: 4px;
  }
  .team-panel.left  .buzzer-indicator.active { background: var(--primary); border-color: var(--primary); box-shadow: 0 0 14px var(--primary); }
  .team-panel.right .buzzer-indicator.active { background: var(--secondary); border-color: var(--secondary-dark); box-shadow: 0 0 14px var(--secondary); }

  /* ===== CENTER PANEL ===== */
  #center-panel {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 10px;
  }

  #round-badge {
    font-size: 0.7rem;
    letter-spacing: 0.22em;
    color: var(--primary-dark);
    text-transform: uppercase;
    border: 1.5px solid var(--primary);
    background: var(--primary-light);
    padding: 3px 16px;
    border-radius: 20px;
  }

  /* Question board */
  #question-board {
    background: var(--bg2);
    border: 3px solid var(--primary);
    border-radius: 16px;
    padding: 26px 32px;
    width: 100%;
    text-align: center;
    box-shadow: 0 0 0 6px var(--primary-light), var(--shadow);
    position: relative;
    min-height: 150px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 12px;
  }
  #question-board::before, #question-board::after {
    content: '◆';
    position: absolute;
    top: 50%;
    transform: translateY(-50%);
    color: var(--primary);
    font-size: 0.9rem;
    opacity: 0.3;
  }
  #question-board::before { left: 13px; }
  #question-board::after  { right: 13px; }

  /* Waiting state */
  #question-waiting {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 10px;
  }
  #question-waiting .press-t {
    font-family: 'Oswald', sans-serif;
    font-size: 1rem;
    letter-spacing: 0.12em;
    color: var(--text-muted);
    text-transform: uppercase;
  }
  #question-waiting .key-badge {
    display: inline-block;
    background: var(--secondary);
    color: var(--text-dark);
    font-family: 'Bebas Neue', sans-serif;
    font-size: 2.2rem;
    letter-spacing: 0.1em;
    padding: 6px 28px;
    border-radius: 10px;
    box-shadow: 0 4px 0 var(--secondary-dark);
  }

  #question-text {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(1.5rem, 3vw, 2.5rem);
    letter-spacing: 0.05em;
    color: var(--text-dark);
    line-height: 1.2;
    padding: 0 20px;
    transition: opacity 0.35s;
    display: none;
  }

  #answer-reveal {
    display: none;
    background: var(--primary);
    border-radius: 10px;
    padding: 11px 26px;
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(1.2rem, 2.4vw, 1.9rem);
    letter-spacing: 0.08em;
    color: white;
    text-align: center;
    box-shadow: 0 4px 16px rgba(36,181,156,0.35);
    animation: slideDown 0.3s ease;
    width: 90%;
  }
  @keyframes slideDown {
    from { transform: translateY(-10px); opacity: 0; }
    to   { transform: translateY(0); opacity: 1; }
  }

  /* ===== TIMER ===== */
  #timer-wrap {
    display: none;
    flex-direction: column;
    align-items: center;
    gap: 5px;
    width: 100%;
  }
  #timer-display {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(2.5rem, 4.5vw, 4rem);
    letter-spacing: 0.05em;
    color: var(--primary);
    line-height: 1;
    transition: color 0.3s;
  }
  #timer-display.urgent { color: var(--red); animation: timerPulse 0.45s ease infinite alternate; }
  @keyframes timerPulse { from { transform: scale(1); } to { transform: scale(1.1); } }
  #timer-label {
    font-size: 0.62rem;
    letter-spacing: 0.2em;
    color: var(--text-muted);
    text-transform: uppercase;
  }
  #timer-bar-wrap {
    width: 100%;
    height: 7px;
    background: var(--primary-light);
    border-radius: 4px;
    overflow: hidden;
  }
  #timer-bar {
    height: 100%;
    background: var(--primary);
    border-radius: 4px;
    transition: width 0.95s linear, background 0.3s;
    width: 100%;
  }
  #timer-bar.urgent { background: var(--red); }

  /* Controls hint */
  #controls-hint {
    display: flex;
    gap: 12px;
    flex-wrap: wrap;
    justify-content: center;
    opacity: 0.5;
    font-size: 0.64rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--text-mid);
  }
  .hint-key {
    border: 1px solid var(--primary);
    border-radius: 4px;
    padding: 1px 6px;
    background: var(--primary-light);
    color: var(--primary-dark);
  }

  #next-btn {
    background: var(--secondary);
    color: var(--text-dark);
    border: none;
    border-radius: 8px;
    padding: 8px 26px;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.2rem;
    letter-spacing: 0.12em;
    cursor: pointer;
    transition: transform 0.15s, box-shadow 0.15s;
    box-shadow: 0 4px 0 var(--secondary-dark);
  }
  #next-btn:hover  { transform: translateY(-2px); box-shadow: 0 6px 0 var(--secondary-dark); }
  #next-btn:active { transform: translateY(2px);  box-shadow: 0 2px 0 var(--secondary-dark); }

  /* ===== BIG X OVERLAY ===== */
  #x-overlay {
    position: fixed; inset: 0;
    display: none;
    align-items: center; justify-content: center;
    z-index: 9990;
    pointer-events: none;
    background: rgba(220,20,20,0.15);
  }
  #x-overlay.show { display: flex; animation: xFlash 1.1s ease-out forwards; }
  #x-symbol {
    font-family: 'Bebas Neue', sans-serif;
    font-size: min(58vw, 58vh);
    color: var(--red-bright);
    text-shadow: 0 0 80px rgba(255,0,0,1), 0 0 160px rgba(255,0,0,0.7), 0 0 20px #fff;
    line-height: 1;
    animation: xPop 1.1s ease-out forwards;
  }
  @keyframes xFlash {
    0%   { background: rgba(255,0,0,0.45); }
    25%  { background: rgba(200,0,0,0.25); }
    100% { background: rgba(150,0,0,0.04); }
  }
  @keyframes xPop {
    0%   { transform: scale(0.1) rotate(-15deg); opacity: 0; }
    35%  { transform: scale(1.2) rotate(4deg); opacity: 1; }
    60%  { transform: scale(0.93) rotate(-2deg); }
    80%  { transform: scale(1.05) rotate(0deg); opacity: 1; }
    100% { transform: scale(1) rotate(0deg); opacity: 0.12; }
  }

  /* Buzzer flash */
  #buzzer-flash {
    position: fixed; inset: 0;
    pointer-events: none; z-index: 9995;
    opacity: 0; transition: opacity 0.1s;
  }
  #buzzer-flash.team-a { background: rgba(36,181,156,0.3); }
  #buzzer-flash.team-b { background: rgba(248,209,62,0.35); }

  /* Corner decorations */
  .corner-dec { position: fixed; width: 38px; height: 38px; opacity: 0.22; }
  .corner-dec.tl { top:8px; left:8px;   border-top:2px solid var(--primary); border-left:2px solid var(--primary); }
  .corner-dec.tr { top:8px; right:8px;  border-top:2px solid var(--primary); border-right:2px solid var(--primary); }
  .corner-dec.bl { bottom:8px; left:8px;  border-bottom:2px solid var(--primary); border-left:2px solid var(--primary); }
  .corner-dec.br { bottom:8px; right:8px; border-bottom:2px solid var(--primary); border-right:2px solid var(--primary); }

  /* Connection status */
  #ws-status {
    position: fixed; bottom: 10px; right: 12px;
    font-size: 0.6rem; letter-spacing: 0.1em;
    opacity: 0.45; display: flex; align-items: center; gap: 5px;
    text-transform: uppercase; color: var(--text-mid); z-index: 100;
  }
  #ws-dot { width:7px; height:7px; border-radius:50%; background:#aaa; transition:background 0.3s; }
  #ws-dot.connected { background: var(--primary); box-shadow: 0 0 8px var(--primary); }
  #ws-dot.buzzing   { background: var(--secondary); box-shadow: 0 0 12px var(--secondary); }
</style>
</head>
<body>

<div class="corner-dec tl"></div>
<div class="corner-dec tr"></div>
<div class="corner-dec bl"></div>
<div class="corner-dec br"></div>

<!-- 3D Logo Spring -->
<div id="logo-spring" title="Click & drag!">
  <canvas id="logo-canvas" width="160" height="160" style="display:block;width:160px;height:160px;border-radius:14px;"></canvas>
</div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
(function() {
  const canvas = document.getElementById('logo-canvas');
  const SIZE = 160;
  const renderer = new THREE.WebGLRenderer({ canvas, alpha: true, antialias: true });
  renderer.setSize(SIZE, SIZE);
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
  renderer.setClearColor(0x000000, 0);
  renderer.outputEncoding = THREE.sRGBEncoding;
  renderer.toneMapping = THREE.ACESFilmicToneMapping;
  renderer.toneMappingExposure = 1.6;   // brighter overall exposure

  const scene = new THREE.Scene();
  const camera = new THREE.PerspectiveCamera(40, 1, 0.1, 200);
  camera.position.set(0, 0, 5);

  // ── Rich colorful multi-light rig ──────────────────────────────────────
  // Bright white base
  scene.add(new THREE.AmbientLight(0xffffff, 0.9));

  // Key light: warm golden-yellow (matches sun in logo)
  const key = new THREE.DirectionalLight(0xffe44d, 2.2);
  key.position.set(3, 5, 6);
  scene.add(key);

  // Fill: teal/cyan (matches the letter color)
  const fill = new THREE.DirectionalLight(0x24b59c, 1.4);
  fill.position.set(-5, 0, 4);
  scene.add(fill);

  // Rim: bright yellow from behind-top (sun glow)
  const rim = new THREE.DirectionalLight(0xf8d13e, 1.8);
  rim.position.set(0, 6, -4);
  scene.add(rim);

  // Bounce: soft orange warmth from below
  const bounce = new THREE.DirectionalLight(0xff9933, 0.8);
  bounce.position.set(0, -4, 2);
  scene.add(bounce);

  // Accent: cool purple/blue from left for contrast
  const accent = new THREE.DirectionalLight(0x66aaff, 0.6);
  accent.position.set(-4, 2, 3);
  scene.add(accent);

  const root = new THREE.Group();
  scene.add(root);

  // Load the real GLB logo
  const loaderScript = document.createElement('script');
  loaderScript.src = 'https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js';
  loaderScript.onload = function() {
    const loader = new THREE.GLTFLoader();
    loader.load(
      'logo.glb',
      function(gltf) {
        const model = gltf.scene;

        // Boost material colors/metalness on every mesh for vibrancy
        model.traverse(function(obj) {
          if (obj.isMesh && obj.material) {
            const mats = Array.isArray(obj.material) ? obj.material : [obj.material];
            mats.forEach(m => {
              if (m.isMeshStandardMaterial || m.isMeshPhysicalMaterial) {
                m.roughness    = Math.max(0.05, (m.roughness    || 0.5) * 0.4);
                m.metalness    = Math.min(0.55, (m.metalness    || 0.0) + 0.2);
                m.envMapIntensity = 1.5;
                m.needsUpdate  = true;
              }
            });
          }
        });

        // Auto-center and scale to fill the canvas
        const box    = new THREE.Box3().setFromObject(model);
        const center = box.getCenter(new THREE.Vector3());
        const size   = box.getSize(new THREE.Vector3());
        const maxDim = Math.max(size.x, size.y, size.z);
        const scale  = 4.2 / maxDim;   // larger fill factor

        model.position.sub(center);
        model.scale.setScalar(scale);
        root.add(model);

        // Fit camera
        const fov = camera.fov * (Math.PI / 180);
        camera.position.z = (4.2 / (2 * Math.tan(fov / 2))) * 1.15;
        camera.updateProjectionMatrix();

        window.__logo3dGroup = root;
      },
      undefined,
      function(err) {
        console.warn('GLB load error:', err);
        const geo = new THREE.CylinderGeometry(1, 1, 0.35, 6);
        const mat = new THREE.MeshStandardMaterial({ color: 0x24b59c, roughness: 0.1, metalness: 0.4 });
        root.add(new THREE.Mesh(geo, mat));
        window.__logo3dGroup = root;
      }
    );
  };
  document.head.appendChild(loaderScript);

  // Idle animation
  let t = 0;
  (function loop() {
    requestAnimationFrame(loop);
    t += 0.016;
    if (window.__logo3dGroup) {
      window.__logo3dGroup.rotation.y = Math.sin(t * 0.55) * 0.22;
      window.__logo3dGroup.position.y = Math.sin(t * 0.85) * 0.06;
    }
    renderer.render(scene, camera);
  })();

})();
</script>

<!-- Big X Overlay -->
<div id="x-overlay"><div id="x-symbol">✗</div></div>

<!-- Buzzer flash -->
<div id="buzzer-flash"></div>

<!-- Header -->
<div id="header">
  <div contenteditable="true" id="game-title" spellcheck="false">FAMILY FEUD</div>
  <div id="subtitle">◆ Survey Says ◆</div>
  <div id="stage-wrap">
    <span class="stage-label">Stage</span>
    <button class="stage-btn active" id="stage1-btn" onclick="setStage(1)">1</button>
    <button class="stage-btn"        id="stage2-btn" onclick="setStage(2)">2</button>
  </div>
</div>

<!-- Main Layout -->
<div id="main">

  <!-- Team A -->
  <div class="team-panel left">
    <input class="team-name-input" id="team-a-name" value="TEAM ALPHA" maxlength="16" spellcheck="false">
    <div class="score-display" id="score-a">0</div>
    <div class="score-hint">← Q / W →</div>
    <div class="buzzer-indicator" id="buzz-a"></div>
  </div>

  <!-- Center -->
  <div id="center-panel">
    <div id="round-badge">Round <span id="round-num">1</span> &nbsp;·&nbsp; Stage <span id="round-stage">1</span></div>

    <div id="question-board">
      <div id="question-waiting">
        <div class="press-t">Press to reveal question</div>
        <div class="key-badge">T</div>
      </div>
      <div id="question-text"></div>
      <div id="answer-reveal"></div>
    </div>

    <div id="timer-wrap">
      <div id="timer-label">Time Remaining</div>
      <div id="timer-display">10</div>
      <div id="timer-bar-wrap"><div id="timer-bar"></div></div>
    </div>

    <div id="controls-hint">
      <span><span class="hint-key">T</span> Show question</span>
      <span><span class="hint-key">Y</span> Reveal answer</span>
      <span><span class="hint-key">Q/W</span> Team A −/+</span>
      <span><span class="hint-key">O/P</span> Team B −/+</span>
      <span><span class="hint-key">X</span> Wrong!</span>
      <span><span class="hint-key">Space</span> Next</span>
    </div>
    <button id="next-btn" onclick="nextQuestion()">▶ Next Question</button>
  </div>

  <!-- Team B -->
  <div class="team-panel right">
    <input class="team-name-input" id="team-b-name" value="TEAM BRAVO" maxlength="16" spellcheck="false">
    <div class="score-display" id="score-b">0</div>
    <div class="score-hint">← O / P →</div>
    <div class="buzzer-indicator" id="buzz-b"></div>
  </div>

</div>

<div id="ws-status">
  <div id="ws-dot"></div>
  <span id="ws-label">ESP32 disconnected</span>
</div>

<script>
// ============================================================
//  STATE
// ============================================================
let allQuestions = [];
let currentQuestion = null;
let usedIndices = new Set();
let roundNum = 1;
let scoreA = 0, scoreB = 0;
let currentStage = 1;
let questionVisible = false;
let answerVisible = false;
let timerInterval = null;
let timerSeconds = 10;
const TIMER_TOTAL = 10;

// ============================================================
//  QUESTIONS  – loads from questions.json
// ============================================================
async function loadQuestions() {
  try {
    const res = await fetch('questions.json');
    allQuestions = await res.json();
  } catch(e) {
    allQuestions = [
      { question: "Name something you find in a kitchen",       answer: "Refrigerator" },
      { question: "Name a popular sport",                       answer: "Soccer / Football" },
      { question: "Name something people do on weekends",       answer: "Sleep in" },
      { question: "Name a reason people are late to work",      answer: "Traffic" },
      { question: "Name something you take on vacation",        answer: "Clothes / Luggage" },
      { question: "Name a popular fast food item",              answer: "Burger" },
      { question: "Name something you do before bed",           answer: "Brush teeth" },
      { question: "Name a famous landmark",                     answer: "Eiffel Tower" }
    ];
  }
  pickNextQuestion();
}

function pickNextQuestion() {
  if (usedIndices.size >= allQuestions.length) {
    usedIndices.clear();
    roundNum++;
    document.getElementById('round-num').textContent = roundNum;
  }
  let idx;
  do { idx = Math.floor(Math.random() * allQuestions.length); }
  while (usedIndices.has(idx) && usedIndices.size < allQuestions.length);
  usedIndices.add(idx);
  currentQuestion = allQuestions[idx];
  questionVisible = false;
  answerVisible = false;
}

function nextQuestion() {
  stopTimer();
  pickNextQuestion();
  document.getElementById('question-waiting').style.display = 'flex';
  document.getElementById('question-text').style.display = 'none';
  document.getElementById('answer-reveal').style.display = 'none';
  document.getElementById('timer-wrap').style.display = 'none';
  const disp = document.getElementById('timer-display');
  const bar  = document.getElementById('timer-bar');
  disp.classList.remove('urgent');
  bar.classList.remove('urgent');
  bar.style.width = '100%';
  disp.textContent = TIMER_TOTAL;
}

// ============================================================
//  T → SHOW QUESTION + START TIMER
// ============================================================
function showQuestion() {
  if (!currentQuestion || questionVisible) return;
  questionVisible = true;

  document.getElementById('question-waiting').style.display = 'none';
  document.getElementById('answer-reveal').style.display = 'none';
  answerVisible = false;

  const qt = document.getElementById('question-text');
  qt.textContent = currentQuestion.question;
  qt.style.display = 'block';
  qt.style.opacity = 0;
  requestAnimationFrame(() => { qt.style.opacity = 1; });

  startTimer();
}

// ============================================================
//  Y → REVEAL ANSWER
// ============================================================
function showAnswer() {
  if (!questionVisible || answerVisible) return;
  answerVisible = true;
  stopTimer();

  const ar = document.getElementById('answer-reveal');
  // Support both formats: {answer: "..."} or {answers: [{text:...}]}
  const ans = currentQuestion.answer
    || (currentQuestion.answers && currentQuestion.answers[0] && currentQuestion.answers[0].text)
    || '—';
  ar.textContent = '✔ ' + ans;
  ar.style.display = 'block';
  playRevealSound();
}

// ============================================================
//  TIMER
// ============================================================
function startTimer() {
  timerSeconds = TIMER_TOTAL;
  const wrap = document.getElementById('timer-wrap');
  const disp = document.getElementById('timer-display');
  const bar  = document.getElementById('timer-bar');

  wrap.style.display = 'flex';
  disp.textContent = timerSeconds;
  disp.classList.remove('urgent');
  bar.classList.remove('urgent');
  bar.style.transition = 'none';
  bar.style.width = '100%';

  clearInterval(timerInterval);
  timerInterval = setInterval(() => {
    timerSeconds--;
    disp.textContent = timerSeconds;
    const pct = (timerSeconds / TIMER_TOTAL) * 100;
    bar.style.transition = 'width 0.95s linear, background 0.3s';
    bar.style.width = pct + '%';

    if (timerSeconds <= 3) {
      disp.classList.add('urgent');
      bar.classList.add('urgent');
      playTickSound();
    }
    if (timerSeconds <= 0) {
      clearInterval(timerInterval);
      disp.textContent = '0';
      bar.style.width = '0%';
      playTimeUpSound();
    }
  }, 1000);
}

function stopTimer() { clearInterval(timerInterval); }

// ============================================================
//  STAGE
// ============================================================
function setStage(n) {
  currentStage = n;
  document.getElementById('stage1-btn').classList.toggle('active', n === 1);
  document.getElementById('stage2-btn').classList.toggle('active', n === 2);
  document.getElementById('round-stage').textContent = n;
}

// ============================================================
//  SCORE  (allows negative)
// ============================================================
function updateScore(team, delta) {
  if (team === 'a') {
    scoreA += delta;
    const el = document.getElementById('score-a');
    el.textContent = scoreA;
    el.classList.toggle('negative', scoreA < 0);
    bumpAnim(el);
  } else {
    scoreB += delta;
    const el = document.getElementById('score-b');
    el.textContent = scoreB;
    el.classList.toggle('negative', scoreB < 0);
    bumpAnim(el);
  }
  if (delta > 0) playScoreUpSound();
  else playScoreDownSound();
}

function bumpAnim(el) {
  el.classList.add('bump');
  setTimeout(() => el.classList.remove('bump'), 200);
}

// ============================================================
//  KEYBOARD
// ============================================================
document.addEventListener('keydown', (e) => {
  // Skip if user is typing in a team name input
  if (e.target.tagName === 'INPUT' && e.target.classList.contains('team-name-input')) return;
  // Allow title editing for non-shortcut keys
  if (e.target.contentEditable === 'true' && e.key.length === 1 && !e.ctrlKey && !e.metaKey) return;

  switch(e.key.toLowerCase()) {
    case 't': e.preventDefault(); showQuestion(); break;
    case 'y': showAnswer(); break;
    case 'q': updateScore('a', -1); break;
    case 'w': updateScore('a', +1); break;
    case 'o': updateScore('b', -1); break;
    case 'p': updateScore('b', +1); break;
    case 'x': showWrongX(); break;
    case ' ': e.preventDefault(); nextQuestion(); break;
  }
});

// ============================================================
//  WRONG X  (X key)
// ============================================================
let xTimeout;
function showWrongX() {
  playWrongSound();
  const overlay = document.getElementById('x-overlay');
  overlay.classList.remove('show');
  void overlay.offsetWidth; // restart animation
  overlay.classList.add('show');
  clearTimeout(xTimeout);
  xTimeout = setTimeout(() => overlay.classList.remove('show'), 1400);
}

// ============================================================
//  SOUNDS  (Web Audio API)
// ============================================================
let audioCtx;
function getCtx() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  return audioCtx;
}

// LOUD BZZZZZZ — three layered oscillators at high gain
function playWrongSound() {
  const ctx = getCtx();

  // Master gain — cranked up
  const master = ctx.createGain();
  master.gain.setValueAtTime(2.5, ctx.currentTime);
  master.connect(ctx.destination);

  // Layer 1: thick sawtooth at 110Hz — the core buzz
  const o1 = ctx.createOscillator();
  const g1 = ctx.createGain();
  o1.connect(g1); g1.connect(master);
  o1.type = 'sawtooth';
  // Rapid pitch wobble = "BZZZ" character
  for (let i = 0; i < 16; i++) {
    o1.frequency.setValueAtTime(i % 2 === 0 ? 115 : 105, ctx.currentTime + i * 0.055);
  }
  g1.gain.setValueAtTime(0.75, ctx.currentTime);
  g1.gain.setValueAtTime(0.75, ctx.currentTime + 0.75);
  g1.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 1.0);
  o1.start(ctx.currentTime); o1.stop(ctx.currentTime + 1.05);

  // Layer 2: square wave sub bass
  const o2 = ctx.createOscillator();
  const g2 = ctx.createGain();
  o2.connect(g2); g2.connect(master);
  o2.type = 'square';
  o2.frequency.value = 58;
  g2.gain.setValueAtTime(0.5, ctx.currentTime);
  g2.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.95);
  o2.start(ctx.currentTime); o2.stop(ctx.currentTime + 0.98);

  // Layer 3: high buzzy harmonic
  const o3 = ctx.createOscillator();
  const g3 = ctx.createGain();
  o3.connect(g3); g3.connect(master);
  o3.type = 'sawtooth';
  for (let i = 0; i < 20; i++) {
    o3.frequency.setValueAtTime(i % 2 === 0 ? 230 : 210, ctx.currentTime + i * 0.04);
  }
  g3.gain.setValueAtTime(0.45, ctx.currentTime);
  g3.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.85);
  o3.start(ctx.currentTime); o3.stop(ctx.currentTime + 0.9);
}

function playRevealSound() {
  const ctx = getCtx();
  [0, 0.09, 0.18].forEach((t, i) => {
    const osc = ctx.createOscillator();
    const g = ctx.createGain();
    osc.connect(g); g.connect(ctx.destination);
    osc.type = 'triangle';
    osc.frequency.value = 660 + i * 220;
    g.gain.setValueAtTime(0.35, ctx.currentTime + t);
    g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + t + 0.22);
    osc.start(ctx.currentTime + t);
    osc.stop(ctx.currentTime + t + 0.25);
  });
}

// Cheerful ascending chime for +1 — C5 → E5
function playScoreUpSound() {
  const ctx = getCtx();
  [[523, 0], [659, 0.13]].forEach(([freq, t]) => {
    const osc = ctx.createOscillator();
    const g   = ctx.createGain();
    osc.connect(g); g.connect(ctx.destination);
    osc.type = 'sine';
    osc.frequency.value = freq;
    g.gain.setValueAtTime(0, ctx.currentTime + t);
    g.gain.linearRampToValueAtTime(0.5, ctx.currentTime + t + 0.015);
    g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + t + 0.32);
    osc.start(ctx.currentTime + t);
    osc.stop(ctx.currentTime + t + 0.35);
    // Soft harmonic overtone
    const osc2 = ctx.createOscillator();
    const g2   = ctx.createGain();
    osc2.connect(g2); g2.connect(ctx.destination);
    osc2.type = 'triangle';
    osc2.frequency.value = freq * 2;
    g2.gain.setValueAtTime(0, ctx.currentTime + t);
    g2.gain.linearRampToValueAtTime(0.15, ctx.currentTime + t + 0.015);
    g2.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + t + 0.25);
    osc2.start(ctx.currentTime + t);
    osc2.stop(ctx.currentTime + t + 0.28);
  });
}

// Short descending blip for -1
function playScoreDownSound() {
  const ctx = getCtx();
  [[380, 0], [280, 0.1]].forEach(([freq, t]) => {
    const osc = ctx.createOscillator();
    const g   = ctx.createGain();
    osc.connect(g); g.connect(ctx.destination);
    osc.type = 'sine';
    osc.frequency.value = freq;
    g.gain.setValueAtTime(0.3, ctx.currentTime + t);
    g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + t + 0.18);
    osc.start(ctx.currentTime + t);
    osc.stop(ctx.currentTime + t + 0.2);
  });
}

function playTickSound() {
  const ctx = getCtx();
  const osc = ctx.createOscillator();
  const g = ctx.createGain();
  osc.connect(g); g.connect(ctx.destination);
  osc.type = 'sine';
  osc.frequency.value = 900;
  g.gain.setValueAtTime(0.2, ctx.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.07);
  osc.start(ctx.currentTime); osc.stop(ctx.currentTime + 0.09);
}

function playTimeUpSound() {
  const ctx = getCtx();
  [0, 0.13, 0.26].forEach((t, i) => {
    const osc = ctx.createOscillator();
    const g = ctx.createGain();
    osc.connect(g); g.connect(ctx.destination);
    osc.type = 'sawtooth';
    osc.frequency.value = 300 - i * 60;
    g.gain.setValueAtTime(0.4, ctx.currentTime + t);
    g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + t + 0.18);
    osc.start(ctx.currentTime + t); osc.stop(ctx.currentTime + t + 0.2);
  });
}

function playBuzzerSound() {
  const ctx = getCtx();
  for (let i = 0; i < 3; i++) {
    const osc = ctx.createOscillator();
    const g = ctx.createGain();
    osc.connect(g); g.connect(ctx.destination);
    osc.type = 'square';
    osc.frequency.value = 880 + i * 220;
    g.gain.setValueAtTime(0.4, ctx.currentTime + i * 0.11);
    g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.1 + i * 0.11);
    osc.start(ctx.currentTime + i * 0.11);
    osc.stop(ctx.currentTime + 0.14 + i * 0.11);
  }
}

// ============================================================
//  ESP32 WEBSOCKET
// ============================================================
let ws, wsReconnectTimer;
const ESP32_IP = '192.168.1.100'; // ← Change to your ESP32 IP
const WS_PORT = 81;

function connectESP32() {
  try {
    ws = new WebSocket(`ws://${ESP32_IP}:${WS_PORT}/`);
    ws.onopen    = () => setWsStatus('connected', 'ESP32 connected');
    ws.onmessage = (e) => handleBuzzerMessage(e.data.trim());
    ws.onclose   = () => {
      setWsStatus('disconnected', 'ESP32 disconnected');
      wsReconnectTimer = setTimeout(connectESP32, 4000);
    };
    ws.onerror   = () => setWsStatus('disconnected', 'ESP32 error');
  } catch(e) {
    setWsStatus('disconnected', 'WS unavailable');
  }
}

function handleBuzzerMessage(msg) {
  setWsStatus('buzzing', 'BUZZER!');
  setTimeout(() => setWsStatus('connected', 'ESP32 connected'), 1200);
  if (msg === 'BUZZ_A' || msg === 'A') {
    flashBuzzer('team-a'); animateBuzzIndicator('buzz-a');
  } else if (msg === 'BUZZ_B' || msg === 'B') {
    flashBuzzer('team-b'); animateBuzzIndicator('buzz-b');
  } else {
    flashBuzzer('team-a'); animateBuzzIndicator('buzz-a');
  }
  playBuzzerSound();
}

function flashBuzzer(cls) {
  const f = document.getElementById('buzzer-flash');
  f.className = cls; f.style.opacity = 1;
  setTimeout(() => { f.style.opacity = 0; f.className = ''; }, 500);
}
function animateBuzzIndicator(id) {
  const el = document.getElementById(id);
  el.classList.add('active');
  setTimeout(() => el.classList.remove('active'), 1500);
}
function setWsStatus(state, label) {
  document.getElementById('ws-dot').className = state;
  document.getElementById('ws-label').textContent = label;
}

// ============================================================
//  3D LOGO SPRING PHYSICS
// ============================================================
const logo = document.getElementById('logo-spring');
// tilt the 3D figure during drag
function updateLogoTilt(dx, dy) {
  if (window.__logo3dGroup) {
    window.__logo3dGroup.rotation.x = -dy * 0.01;
    window.__logo3dGroup.rotation.z = -dx * 0.01;
  }
}
const _origMouseup = document.addEventListener;

let lc = {x:0,y:0}, lv = {x:0,y:0}, ls = {x:0,y:0};
let dragging = false, ds = {x:0,y:0};
let sAF;
const K = 0.12, DAMP = 0.74;

function springTick() {
  if (dragging) { sAF = requestAnimationFrame(springTick); return; }
  lv.x = (lv.x - K * lc.x) * DAMP;
  lv.y = (lv.y - K * lc.y) * DAMP;
  lc.x += lv.x; lc.y += lv.y;
  logo.style.transform = `translate(${lc.x}px,${lc.y}px) rotate(${lc.x*0.28}deg)`;
  if (Math.abs(lc.x)<0.25 && Math.abs(lc.y)<0.25 && Math.abs(lv.x)<0.15 && Math.abs(lv.y)<0.15) {
    lc={x:0,y:0}; logo.style.transform=''; return;
  }
  sAF = requestAnimationFrame(springTick);
}

logo.addEventListener('mousedown', e => {
  dragging=true; ds={x:e.clientX,y:e.clientY}; ls={...lc};
  cancelAnimationFrame(sAF); e.preventDefault();
});
document.addEventListener('mousemove', e => {
  if (!dragging) return;
  lc.x=ls.x+(e.clientX-ds.x); lc.y=ls.y+(e.clientY-ds.y);
  logo.style.transform=`translate(${lc.x}px,${lc.y}px) rotate(${lc.x*0.28}deg) scale(1.1)`;
  updateLogoTilt(lc.x, lc.y);
});
document.addEventListener('mouseup', e => {
  if (!dragging) return; dragging=false;
  lv.x=(e.clientX-ds.x)*0.1; lv.y=(e.clientY-ds.y)*0.1;
  sAF=requestAnimationFrame(springTick);
});
logo.addEventListener('touchstart', e => {
  const t=e.touches[0]; dragging=true;
  ds={x:t.clientX,y:t.clientY}; ls={...lc};
  cancelAnimationFrame(sAF); e.preventDefault();
},{passive:false});
document.addEventListener('touchmove', e => {
  if (!dragging) return; const t=e.touches[0];
  lc.x=ls.x+(t.clientX-ds.x); lc.y=ls.y+(t.clientY-ds.y);
  logo.style.transform=`translate(${lc.x}px,${lc.y}px) rotate(${lc.x*0.28}deg) scale(1.1)`;
});
document.addEventListener('touchend', e => {
  if (!dragging) return; dragging=false; const t=e.changedTouches[0];
  lv.x=(t.clientX-ds.x)*0.08; lv.y=(t.clientY-ds.y)*0.08;
  sAF=requestAnimationFrame(springTick);
});

// ============================================================
//  INIT
// ============================================================
window.addEventListener('load', () => {
  loadQuestions();
  connectESP32();
  document.addEventListener('click',   () => getCtx(), { once: true });
  document.addEventListener('keydown', () => getCtx(), { once: true });
});
