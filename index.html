<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AEE ASU: Energy Challenge</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --aeu-teal: #24b59c; /* Core branding color from logo */
            --pure-white: #ffffff;
            --text-off-black: #333333;
            --light-border: #e0e0e0;
        }

        body {
            background-color: var(--pure-white);
            color: var(--text-off-black);
            font-family: 'Montserrat', sans-serif;
            margin: 0;
            overflow: hidden;
            display: grid;
            grid-template-areas: 
                "header header header"
                "sidebarL main sidebarR"
                "footer footer footer";
            grid-template-columns: 240px 1fr 240px; /* Logo | Main | Scores */
            grid-template-rows: 90px 1fr 40px; /* Header | Game | Info */
            height: 100vh;
        }

        /* --- Global Elements --- */
        header { 
            grid-area: header; border-bottom: 2px solid var(--aeu-teal);
            display: flex; align-items: center; justify-content: space-around;
        }
        h1 { font-size: 24px; color: var(--aeu-teal); margin: 0; text-transform: uppercase; font-weight: 900;}
        h2 { font-size: 16px; margin: 0; font-weight: 400; color: #666;}

        footer { 
            grid-area: footer; border-top: 1px solid var(--aeu-teal); background-color: #fbfbfb;
            display: flex; align-items: center; justify-content: center;
            font-size: 11px; font-weight: bold; text-transform: uppercase; color: #888;
        }

        /* --- Sidebar A (Left): The Floating 3D Logo area --- */
        .sidebar-logo { grid-area: sidebarL; background-color: var(--pure-white); border-right: 1px solid var(--light-border); display: flex; align-items: center; justify-content: center; perspective: 1000px;}
        .logo-box { width: 100%; text-align: center; color: var(--aeu-teal); font-weight: bold; font-size: 14px;}
        
        /* The specific 'AEE ASU' Logo element for 3D simulation */
        .aee-logo-3d {
            width: 140px; height: 140px; background-color: var(--aeu-teal); border-radius: 50%; display: flex; align-items: center; justify-content: center; color: var(--pure-white); font-weight: 900; font-size: 32px;
            box-shadow: 0 10px 25px rgba(36, 181, 156, 0.3);
            animation: floatAndRotate 8s ease-in-out infinite;
        }

        @keyframes floatAndRotate {
            0% { transform: translate(0, 0px) rotateY(0deg); }
            50% { transform: translate(0, -15px) rotateY(15deg); }
            100% { transform: translate(0, 0px) rotateY(0deg); }
        }

        /* --- Sidebar B (Right): Dedicated Sidebar Scores --- */
        .sidebar-scores { grid-area: sidebarR; background: #fafafa; border-left: 1px solid var(--light-border); box-sizing: border-box;}
        .score-box { height: 50%; display: flex; flex-direction: column; align-items: center; justify-content: center; border-bottom: 1px solid var(--light-border);}
        
        .team-title { color: var(--text-off-black); font-weight: bold; text-transform: uppercase; letter-spacing: 1px; font-size: 14px; }
        .score-display { font-size: 100px; font-weight: 900; color: var(--aeu-teal); margin: 10px 0; }
        
        /* Turn-marker logic for Stage 1 */
        .score-box.active { border-right: 5px solid var(--aeu-teal); }

        /* --- Main Dynamic Area --- */
        #gameArea { grid-area: main; display: flex; align-items: center; justify-content: center;}

        /* --- Layout: Stage 1 (Individual QA) --- */
        .qa-container { display: flex; flex-direction: column; align-items: center; text-align: center; width: 85%;}
        .stage-indicator { font-size: 12px; color: var(--aeu-teal); text-transform: uppercase; letter-spacing: 3px; border-bottom: 1px solid var(--light-border); padding-bottom: 5px;}
