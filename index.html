<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AEE ASU: Unified Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --aeu-teal: #24b59c;
            --pure-white: #ffffff;
            --text-off-black: #333333;
            --border-grey: #e0e0e0;
        }

        body {
            background-color: var(--pure-white);
            color: var(--text-off-black);
            font-family: 'Montserrat', sans-serif;
            margin: 0;
            overflow: hidden;
            height: 100vh;
            display: grid;
            grid-template-areas: 
                "header header header"
                "sidebarL main sidebarR"
                "footer footer footer";
            grid-template-columns: 240px 1fr 240px;
            grid-template-rows: 90px 1fr 40px;
        }

        header { 
            grid-area: header; border-bottom: 2px solid var(--aeu-teal);
            display: flex; align-items: center; justify-content: space-around;
        }
        h1 { font-size: 26px; color: var(--aeu-teal); margin: 0; text-transform: uppercase; font-weight: 900;}

        .dashboard-sidebar {
            background: #fafafa;
            border: 1px solid var(--border-grey);
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-around;
        }
        
        .team-label { font-weight: bold; font-size: 18px; color: var(--aeu-teal); text-transform: uppercase; }

        /* --- Multi-Axis 3D Logo (Left Sidebar) --- */
        .dashboard-sidebar.left { grid-area: sidebarL; border-right: 1px solid var(--aeu-teal); perspective: 1200px; }
        
        .logo-container-3d {
            width: 140px; height: 140px;
            transform-style: preserve-3d;
            animation: orbitalRotate 10s linear infinite;
            display: flex; align-items: center; justify-content: center;
        }

        .aee-sphere {
            width: 120px; height: 120px; background-color: var(--aeu-teal); border-radius: 50%; 
            display: flex; align-items: center; justify-content: center; color: white; 
            font-weight: 900; font-size: 32px;
            box-shadow: 0 15px 35px rgba(36, 181, 156, 0.4);
        }

        @keyframes orbitalRotate {
            0% { transform: rotateX(0deg) rotateY(0deg) rotateZ(0deg) translateZ(0); }
            25% { transform: rotateX(15deg) rotateY(90deg) translateY(-10px) translateZ(20px); }
            50% { transform: rotateX(0deg) rotateY(180deg) translateY(0) translateZ(50px); }
            75% { transform: rotateX(-15deg) rotateY(270deg) translateY(10px) translateZ(20px); }
            100% { transform: rotateX(0deg) rotateY(360deg) rotateZ(0deg) translateZ(0); }
        }

        .dashboard-sidebar.right { grid-area: sidebarR; border-left: 1px solid var(--aeu-teal); }
        .score-val { font-size: 80px; font-weight: 900; color: var(--text-off-black); }

        /* BUZZ Buttons */
        .buzz-indicator {
            background-color: #ff3333; color: white; border: none; padding: 10px 30px; border-radius: 20px; 
            font-weight: bold; text-transform: uppercase; font-size: 14px; opacity: 0.3;
        }
        .stage-2 .buzz-indicator { opacity: 1; box-shadow: 0 5px 15px rgba(255,51,51,0.4); }

        #gameArea { grid-area: main; display: grid; grid-template-rows: 1fr auto; padding: 40px; gap: 20px; align-items: center; justify-items: center; }

        .qa-center-box {
            border: 2px solid var(--aeu-teal); border-radius: 12px; padding: 30px; width: 90%; height: 80%;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            text-align: center; font-size: 28px; font-weight: bold; background: white;
        }

        .mcq-grid {
            display: none; grid-template-columns: 1fr 1fr; gap: 15px; width: 90%;
        }
        .stage-2 .mcq-grid { display: grid; }

        .mcq-opt {
            background: #f4f4f4; border: 1px solid var(--border-grey); border-radius: 8px; padding: 15px;
            font-size: 16px; text-align: left; transition: 0.2s;
        }
        .mcq-opt:hover { border-color: var(--aeu-teal); background: white; }

        footer { grid-area: footer;
