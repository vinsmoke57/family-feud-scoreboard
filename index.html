<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AEE Annual Conference</title>
  <meta name="description" content="Welcome to the AEE Annual Conference — Energy Awareness Competition">
  <link
    href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Oswald:wght@400;600;700&family=Inter:wght@400;500;600&family=Outfit:wght@300;400;600;700&display=swap"
    rel="stylesheet">
  <style>
    /* =======================================
       INTRO OVERLAY STYLES
       ======================================= */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      overflow: hidden;
      width: 100%;
      height: 100%;
    }

    #intro-overlay {
      position: fixed;
      inset: 0;
      z-index: 99999;
      background: #030014;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: opacity 1.2s cubic-bezier(0.4, 0, 0.2, 1), transform 1.2s cubic-bezier(0.4, 0, 0.2, 1);
    }

    #intro-overlay.fade-out {
      opacity: 0;
      transform: scale(1.05);
      pointer-events: none;
    }

    #intro-overlay.hidden {
      display: none;
    }

    #intro-canvas {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      z-index: 1;
    }

    #intro-content {
      position: absolute;
      inset: 0;
      z-index: 10;
      display: flex;
      align-items: center;
      justify-content: space-between;
      width: 100%;
      height: 100%;
      padding: 0 6vw;
      pointer-events: none;
      background: linear-gradient(90deg, rgba(3, 0, 20, 0.7) 0%, rgba(3, 0, 20, 0.3) 35%, transparent 55%);
    }

    #intro-text {
      max-width: 45%;
      opacity: 0;
      transform: translateX(-60px);
      animation: textSlideIn 1.4s cubic-bezier(0.16, 1, 0.3, 1) 0.5s forwards;
    }

    @keyframes textSlideIn {
      to {
        opacity: 1;
        transform: translateX(0);
      }
    }

    #intro-text h1 {
      font-family: 'Outfit', 'Bebas Neue', sans-serif;
      font-weight: 700;
      font-size: clamp(2rem, 4.5vw, 4.2rem);
      line-height: 1.1;
      color: #ffffff;
      letter-spacing: 0.02em;
      text-shadow: 0 0 60px rgba(36, 181, 156, 0.3), 0 0 120px rgba(36, 181, 156, 0.1);
      margin-bottom: 20px;
    }

    #intro-text h1 .accent {
      background: linear-gradient(135deg, #24b59c, #4ae8cc);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    #intro-text p {
      font-family: 'Outfit', sans-serif;
      font-weight: 300;
      font-size: clamp(0.9rem, 1.5vw, 1.3rem);
      color: rgba(255, 255, 255, 0.45);
      letter-spacing: 0.25em;
      text-transform: uppercase;
      opacity: 0;
      transform: translateY(15px);
      animation: subtitleFadeIn 1s ease 1.4s forwards;
    }

    @keyframes subtitleFadeIn {
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* Loading indicator */
    #intro-loader {
      position: absolute;
      bottom: 40px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      align-items: center;
      gap: 12px;
      z-index: 3;
      opacity: 0;
      animation: loaderFadeIn 0.6s ease 2s forwards;
    }

    @keyframes loaderFadeIn {
      to { opacity: 1; }
    }

    .loader-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: #24b59c;
      animation: loaderPulse 1.4s ease-in-out infinite;
    }

    .loader-dot:nth-child(2) { animation-delay: 0.2s; }
    .loader-dot:nth-child(3) { animation-delay: 0.4s; }

    @keyframes loaderPulse {
      0%, 80%, 100% { opacity: 0.2; transform: scale(0.8); }
      40% { opacity: 1; transform: scale(1.3); }
    }

    /* Coordinate display during zoom */
    #coord-display {
      position: absolute;
      bottom: 60px;
      right: 6vw;
      font-family: 'Outfit', monospace;
      font-size: 0.85rem;
      color: rgba(74, 232, 204, 0.6);
      letter-spacing: 0.15em;
      z-index: 3;
      opacity: 0;
      transition: opacity 0.6s ease;
    }

    #coord-display.show {
      opacity: 1;
    }

    /* Marker ping animation */
    #marker-ping {
      position: absolute;
      z-index: 3;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.4s ease;
    }

    #marker-ping.show {
      opacity: 1;
    }

    #marker-ping .ping-ring {
      width: 40px;
      height: 40px;
      border: 2px solid rgba(74, 232, 204, 0.6);
      border-radius: 50%;
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      animation: pingExpand 1.5s ease-out infinite;
    }

    #marker-ping .ping-ring:nth-child(2) {
      animation-delay: 0.5s;
    }

    #marker-ping .ping-center {
      width: 8px;
      height: 8px;
      background: #4ae8cc;
      border-radius: 50%;
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      box-shadow: 0 0 15px #4ae8cc, 0 0 30px rgba(74, 232, 204, 0.4);
    }

    @keyframes pingExpand {
      0% { width: 8px; height: 8px; opacity: 1; }
      100% { width: 60px; height: 60px; opacity: 0; }
    }

    /* =======================================
       MAIN WEBSITE STYLES
       ======================================= */
    #main-website {
      opacity: 0;
      transform: translateY(20px);
      transition: opacity 0.8s cubic-bezier(0.4, 0, 0.2, 1), transform 0.8s cubic-bezier(0.4, 0, 0.2, 1);
      min-height: 100vh;
    }

    #main-website.revealed {
      opacity: 1;
      transform: translateY(0);
    }

    /* === ALL EXISTING STYLES BELOW === */
    :root {
      --primary: #24b59c;
      --primary-dark: #1a8a76;
      --primary-light: #d0f5ef;
      --secondary: #f8d13e;
      --secondary-dark: #c9a318;
      --secondary-light: #fef8d8;
      --green: #1db954;
      --green-bright: #00ff5e;
      --red: #e53935;
      --red-bright: #ff1a1a;
      --bg: #f0faf8;
      --bg2: #ffffff;
      --text-dark: #0d2e29;
      --text-mid: #2a6b5f;
      --text-muted: #7ab8ae;
      --border: rgba(36, 181, 156, 0.22);
      --shadow: 0 4px 24px rgba(36, 181, 156, 0.13);
    }

    body {
      background: var(--bg);
      color: var(--text-dark);
      font-family: 'Oswald', sans-serif;
      min-height: 100vh;
      overflow: hidden;
      position: relative;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: radial-gradient(circle, rgba(36, 181, 156, 0.1) 1px, transparent 1px);
      background-size: 28px 28px;
      pointer-events: none;
      z-index: 0;
    }

    /* ===== LOGO — fixed top-left corner, no glow, mouse-rotate ===== */
    #logo-wrap {
      position: fixed;
      top: -10px;
      left: 4px;
      z-index: 9999;
      cursor: grab;
      user-select: none;
    }

    #logo-wrap:active {
      cursor: grabbing;
    }

    #logo-canvas {
      display: block;
      border-radius: 10px;
    }

    /* ===== HEADER ===== */
    /* [UPGRADED] slightly tighter to give the question board more vertical room */
    #header {
      text-align: center;
      padding: 4px 180px 3px;
      position: relative;
      z-index: 10;
    }

    #game-title {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(1.6rem, 3.4vw, 2.8rem);
      letter-spacing: 0.1em;
      color: var(--primary-dark);
      text-shadow: 3px 3px 0 rgba(36, 181, 156, 0.18);
      cursor: pointer;
      outline: none;
      border: none;
      background: transparent;
      width: 100%;
      text-align: center;
      line-height: 1;
    }

    #game-title:focus {
      color: var(--primary);
      border-bottom: 2px solid var(--secondary);
    }

    #stage-wrap {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      margin-top: 4px;
    }

    .stage-btn {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1rem;
      letter-spacing: 0.15em;
      padding: 3px 18px;
      border-radius: 20px;
      border: 2px solid var(--primary);
      background: transparent;
      color: var(--text-muted);
      cursor: pointer;
      transition: all 0.2s;
    }

    .stage-btn.active {
      background: var(--primary);
      color: white;
      box-shadow: 0 2px 10px rgba(36, 181, 156, 0.35);
    }

    .stage-label {
      font-size: 0.68rem;
      letter-spacing: 0.2em;
      color: var(--text-muted);
      text-transform: uppercase;
    }

    /* ===== MAIN LAYOUT ===== */
    /* [UPGRADED] side columns 200px -> 150px to give the question board more room.
       height calc tightened because the header is now smaller. */
    #main {
      display: grid;
      grid-template-columns: 150px 1fr 150px;
      gap: 10px;
      padding: 2px 14px 4px;
      height: calc(100vh - 70px);
      align-items: start;
      position: relative;
      z-index: 1;
    }

    /* ===== TEAM PANELS ===== */
    /* [UPGRADED] tighter padding to compact the scoreboard */
    .team-panel {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
      padding: 10px 8px;
      border-radius: 16px;
      background: var(--bg2);
      border: 2px solid var(--border);
      box-shadow: var(--shadow);
    }

    .team-panel.left {
      border-top: 4px solid #2563eb;
    }

    .team-panel.right {
      border-top: 4px solid var(--secondary);
    }

    /* [UPGRADED] smaller team name input */
    .team-name-input {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(1rem, 1.5vw, 1.3rem);
      letter-spacing: 0.1em;
      text-align: center;
      background: transparent;
      border: none;
      border-bottom: 2px solid transparent;
      color: var(--text-dark);
      width: 100%;
      cursor: pointer;
      outline: none;
      transition: border-color 0.2s;
    }

    .team-panel.left .team-name-input {
      color: #1d4ed8;
    }

    .team-panel.right .team-name-input {
      color: var(--secondary-dark);
    }

    .team-name-input:focus {
      border-bottom-color: var(--secondary);
      cursor: text;
    }

    /* [UPGRADED] smaller score display */
    .score-display {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(2rem, 4vw, 3.5rem);
      line-height: 1;
      transition: transform 0.15s;
    }

    .team-panel.left .score-display {
      color: #2563eb;
    }

    .team-panel.right .score-display {
      color: var(--secondary-dark);
    }

    .score-display.bump {
      transform: scale(1.22);
    }

    .score-display.negative {
      color: var(--red) !important;
    }

    .score-hint {
      font-size: 0.58rem;
      letter-spacing: 0.2em;
      color: var(--text-muted);
      text-transform: uppercase;
    }

    .buzzer-indicator {
      width: 14px;
      height: 14px;
      border-radius: 50%;
      background: rgba(0, 0, 0, 0.06);
      border: 2px solid var(--border);
      transition: all 0.3s;
      margin-top: 4px;
    }

    .team-panel.left .buzzer-indicator.active {
      background: #2563eb;
      border-color: #2563eb;
      box-shadow: 0 0 14px #2563eb;
    }

    .team-panel.right .buzzer-indicator.active {
      background: var(--secondary);
      border-color: var(--secondary-dark);
      box-shadow: 0 0 14px var(--secondary);
    }

    /* ===== CENTER PANEL ===== */
    /* [UPGRADED] overflow:visible so tall content isn't clipped by this wrapper */
    #center-panel {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
      height: 100%;
      min-height: 0;
      overflow: visible;
    }

    #round-badge {
      font-size: 0.7rem;
      letter-spacing: 0.22em;
      color: var(--primary-dark);
      text-transform: uppercase;
      border: 1.5px solid var(--primary);
      background: var(--primary-light);
      padding: 3px 16px;
      border-radius: 20px;
      flex-shrink: 0;
    }

    /* ===== QUESTION BOARD ===== */
    /* [UPGRADED] removed max-height clip and switched to overflow:auto so long
       questions wrap inside the board instead of being hidden. padding reduced
       slightly to give content more room. */
    #question-board {
      background: var(--bg2);
      border: 3px solid var(--primary);
      border-radius: 16px;
      padding: 16px 24px;
      width: 100%;
      flex: 1 1 auto;
      text-align: center;
      box-shadow: 0 0 0 5px var(--primary-light), var(--shadow);
      position: relative;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 10px;
      min-height: 0;
      overflow: auto;
    }

    #question-board::before,
    #question-board::after {
      content: '◆';
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      color: var(--primary);
      font-size: 0.9rem;
      opacity: 0.3;
    }

    #question-board::before {
      left: 14px;
    }

    #question-board::after {
      right: 14px;
    }

    #question-waiting {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
    }

    #question-waiting .press-t {
      font-family: 'Oswald', sans-serif;
      font-size: 1.1rem;
      letter-spacing: 0.12em;
      color: var(--text-muted);
      text-transform: uppercase;
    }

    #question-waiting .key-badge {
      display: inline-block;
      background: var(--secondary);
      color: var(--text-dark);
      font-family: 'Bebas Neue', sans-serif;
      font-size: 2.5rem;
      letter-spacing: 0.1em;
      padding: 8px 32px;
      border-radius: 10px;
      box-shadow: 0 4px 0 var(--secondary-dark);
    }

    /* [UPGRADED] bigger question text + mixed-case font (Bebas Neue was forcing all-caps look).
       Capitalization is handled by JS (see formatQuestionText) so acronyms like CSP, PV, DNI are preserved.
       clamp uses vw so the font auto-shrinks on narrower screens; long questions wrap via overflow-wrap.
       JS also bumps .long / .very-long classes down one more step based on character count. */
    #question-text {
      font-family: 'Outfit', 'Oswald', sans-serif;
      font-weight: 600;
      font-size: clamp(1.8rem, 3.8vw, 3.4rem);
      letter-spacing: 0.01em;
      color: var(--text-dark);
      line-height: 1.15;
      padding: 0 12px;
      transition: opacity 0.35s, font-size 0.2s;
      display: none;
      max-width: 100%;
      overflow-wrap: break-word;
      word-break: normal;
      hyphens: auto;
    }
    #question-text.long {
      font-size: clamp(1.5rem, 3.1vw, 2.7rem);
      line-height: 1.2;
    }
    #question-text.very-long {
      font-size: clamp(1.25rem, 2.5vw, 2.1rem);
      line-height: 1.25;
    }

    /* ===== MC OPTIONS GRID (Stage 1) ===== */
    #options-grid {
      display: none;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      width: 92%;
      margin-top: 8px;
    }

    #options-grid.show {
      display: grid;
      animation: slideDown 0.3s ease;
    }

    /* [UPGRADED] bigger MC options (font + padding). word-break ensures long options wrap. */
    .option-btn {
      background: var(--bg);
      border: 2.5px solid var(--border);
      border-radius: 12px;
      padding: 14px 18px;
      font-family: 'Oswald', sans-serif;
      font-size: clamp(1rem, 1.7vw, 1.4rem);
      font-weight: 600;
      letter-spacing: 0.03em;
      color: var(--text-dark);
      cursor: pointer;
      transition: all 0.2s;
      text-align: left;
      display: flex;
      align-items: center;
      gap: 12px;
      position: relative;
      overflow-wrap: break-word;
      word-break: normal;
      min-width: 0;
    }
    .option-btn .opt-text {
      flex: 1;
      min-width: 0;
    }

    .option-btn:hover {
      border-color: var(--primary);
      background: var(--primary-light);
      transform: translateY(-1px);
    }

    /* [UPGRADED] bigger number badge to match bigger option text */
    .option-btn .opt-num {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 38px;
      height: 38px;
      border-radius: 8px;
      background: var(--primary);
      color: white;
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.5rem;
      flex-shrink: 0;
    }

    .option-btn.correct {
      border-color: var(--green) !important;
      background: rgba(29, 185, 84, 0.15) !important;
      box-shadow: 0 0 20px rgba(29, 185, 84, 0.3);
    }

    .option-btn.correct .opt-num {
      background: var(--green);
    }

    .option-btn.wrong {
      border-color: var(--red) !important;
      background: rgba(229, 57, 53, 0.15) !important;
      box-shadow: 0 0 20px rgba(229, 57, 53, 0.3);
    }

    .option-btn.wrong .opt-num {
      background: var(--red);
    }

    .option-btn.dimmed {
      opacity: 0.45;
      pointer-events: none;
    }

    /* ===== STAGE 2 ANSWER REVEAL ===== */
    #answer-reveal {
      display: none;
      background: var(--primary);
      border-radius: 10px;
      padding: 14px 32px;
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(1.5rem, 3vw, 2.4rem);
      letter-spacing: 0.08em;
      color: white;
      text-align: center;
      box-shadow: 0 4px 16px rgba(36, 181, 156, 0.35);
      animation: slideDown 0.3s ease;
      width: 92%;
    }

    @keyframes slideDown {
      from {
        transform: translateY(-10px);
        opacity: 0;
      }

      to {
        transform: translateY(0);
        opacity: 1;
      }
    }

    /* ===== TIMER ===== */
    #timer-wrap {
      display: none;
      flex-direction: column;
      align-items: center;
      gap: 5px;
      width: 100%;
      flex-shrink: 0;
    }

    #timer-display {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(2.5rem, 4.5vw, 4rem);
      letter-spacing: 0.05em;
      color: var(--primary);
      line-height: 1;
      transition: color 0.3s;
    }

    #timer-display.urgent {
      color: var(--red);
      animation: timerPulse 0.45s ease infinite alternate;
    }

    @keyframes timerPulse {
      from {
        transform: scale(1);
      }

      to {
        transform: scale(1.1);
      }
    }

    #timer-label {
      font-size: 0.62rem;
      letter-spacing: 0.2em;
      color: var(--text-muted);
      text-transform: uppercase;
    }

    #timer-bar-wrap {
      width: 100%;
      height: 7px;
      background: var(--primary-light);
      border-radius: 4px;
      overflow: hidden;
    }

    #timer-bar {
      height: 100%;
      background: var(--primary);
      border-radius: 4px;
      transition: width 0.95s linear, background 0.3s;
      width: 100%;
    }

    #timer-bar.urgent {
      background: var(--red);
    }

    /* ===== BOTTOM CONTROLS ROW ===== */
    #bottom-row {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      flex-shrink: 0;
      flex-wrap: wrap;
    }

    #controls-hint {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      justify-content: center;
      opacity: 0.5;
      font-size: 0.62rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--text-mid);
    }

    .hint-key {
      border: 1px solid var(--primary);
      border-radius: 4px;
      padding: 1px 6px;
      background: var(--primary-light);
      color: var(--primary-dark);
    }

    #next-btn {
      background: var(--secondary);
      color: var(--text-dark);
      border: none;
      border-radius: 8px;
      padding: 8px 22px;
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.1rem;
      letter-spacing: 0.12em;
      cursor: pointer;
      transition: transform 0.15s, box-shadow 0.15s;
      box-shadow: 0 4px 0 var(--secondary-dark);
      flex-shrink: 0;
    }

    #next-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 0 var(--secondary-dark);
    }

    #next-btn:active {
      transform: translateY(2px);
      box-shadow: 0 2px 0 var(--secondary-dark);
    }

    /* Correct button */
    #correct-btn {
      background: var(--green);
      color: white;
      border: none;
      border-radius: 8px;
      padding: 8px 22px;
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.1rem;
      letter-spacing: 0.12em;
      cursor: pointer;
      transition: transform 0.15s, box-shadow 0.15s;
      box-shadow: 0 4px 0 #138a3a;
      flex-shrink: 0;
    }

    #correct-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 0 #138a3a;
    }

    #correct-btn:active {
      transform: translateY(2px);
      box-shadow: 0 2px 0 #138a3a;
    }

    /* ===== BIG X OVERLAY ===== */
    #x-overlay {
      position: fixed;
      inset: 0;
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 9990;
      pointer-events: none;
      background: rgba(220, 20, 20, 0.15);
    }

    #x-overlay.show {
      display: flex;
      animation: xFlash 1.1s ease-out forwards;
    }

    #x-symbol {
      font-family: 'Bebas Neue', sans-serif;
      font-size: min(58vw, 58vh);
      color: var(--red-bright);
      text-shadow: 0 0 80px rgba(255, 0, 0, 1), 0 0 160px rgba(255, 0, 0, 0.7), 0 0 20px #fff;
      line-height: 1;
      animation: xPop 1.1s ease-out forwards;
    }

    @keyframes xFlash {
      0% {
        background: rgba(255, 0, 0, 0.45);
      }

      25% {
        background: rgba(200, 0, 0, 0.25);
      }

      100% {
        background: rgba(150, 0, 0, 0.04);
      }
    }

    @keyframes xPop {
      0% {
        transform: scale(0.1) rotate(-15deg);
        opacity: 0;
      }

      35% {
        transform: scale(1.2) rotate(4deg);
        opacity: 1;
      }

      60% {
        transform: scale(0.93) rotate(-2deg);
      }

      80% {
        transform: scale(1.05) rotate(0deg);
        opacity: 1;
      }

      100% {
        transform: scale(1) rotate(0deg);
        opacity: 0.12;
      }
    }

    /* ===== BIG CHECKMARK OVERLAY ===== */
    #check-overlay {
      position: fixed;
      inset: 0;
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 9990;
      pointer-events: none;
      background: rgba(0, 200, 80, 0.12);
    }

    #check-overlay.show {
      display: flex;
      animation: checkFlash 1.1s ease-out forwards;
    }

    #check-symbol {
      font-family: 'Bebas Neue', sans-serif;
      font-size: min(55vw, 55vh);
      color: var(--green-bright);
      text-shadow: 0 0 80px rgba(0, 255, 80, 1), 0 0 160px rgba(0, 255, 80, 0.7), 0 0 20px #fff;
      line-height: 1;
      animation: checkPop 1.1s ease-out forwards;
    }

    @keyframes checkFlash {
      0% {
        background: rgba(0, 220, 80, 0.45);
      }

      25% {
        background: rgba(0, 180, 60, 0.25);
      }

      100% {
        background: rgba(0, 150, 50, 0.04);
      }
    }

    @keyframes checkPop {
      0% {
        transform: scale(0.1) rotate(15deg);
        opacity: 0;
      }

      35% {
        transform: scale(1.2) rotate(-4deg);
        opacity: 1;
      }

      60% {
        transform: scale(0.93) rotate(2deg);
      }

      80% {
        transform: scale(1.05) rotate(0deg);
        opacity: 1;
      }

      100% {
        transform: scale(1) rotate(0deg);
        opacity: 0.12;
      }
    }

    /* Buzzer flash */
    #buzzer-flash {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 9995;
      opacity: 0;
      transition: opacity 0.1s;
    }

    #buzzer-flash.team-a {
      background: rgba(37, 99, 235, 0.3);
    }

    #buzzer-flash.team-b {
      background: rgba(248, 209, 62, 0.35);
    }

    /* Corner decorations */
    .corner-dec {
      position: fixed;
      width: 38px;
      height: 38px;
      opacity: 0.22;
    }

    .corner-dec.tl {
      top: 8px;
      left: 8px;
      border-top: 2px solid var(--primary);
      border-left: 2px solid var(--primary);
    }

    .corner-dec.tr {
      top: 8px;
      right: 8px;
      border-top: 2px solid var(--primary);
      border-right: 2px solid var(--primary);
    }

    .corner-dec.bl {
      bottom: 8px;
      left: 8px;
      border-bottom: 2px solid var(--primary);
      border-left: 2px solid var(--primary);
    }

    .corner-dec.br {
      bottom: 8px;
      right: 8px;
      border-bottom: 2px solid var(--primary);
      border-right: 2px solid var(--primary);
    }

    #ws-status {
      position: fixed;
      bottom: 10px;
      right: 12px;
      font-size: 0.6rem;
      letter-spacing: 0.1em;
      opacity: 0.45;
      display: flex;
      align-items: center;
      gap: 5px;
      text-transform: uppercase;
      color: var(--text-mid);
      z-index: 100;
    }

    #ws-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: #aaa;
      transition: background 0.3s;
    }

    #ws-dot.connected {
      background: var(--primary);
      box-shadow: 0 0 8px var(--primary);
    }

    #ws-dot.buzzing {
      background: var(--secondary);
      box-shadow: 0 0 12px var(--secondary);
    }

    /* ===== BUZZ BANNER ===== */
    #buzz-banner {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 9988;
      pointer-events: none;
    }

    #buzz-banner.show {
      display: flex;
      animation: bannerFlash 2.5s ease-out forwards;
    }

    #buzz-banner-inner {
      padding: 24px 64px;
      border-radius: 16px;
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(2.5rem, 6vw, 5rem);
      letter-spacing: 0.08em;
      color: white;
      text-align: center;
      animation: bannerPop 2.5s ease-out forwards;
    }

    #buzz-banner.team-a #buzz-banner-inner {
      background: linear-gradient(135deg, #2563eb, #1d4ed8);
      box-shadow: 0 0 60px rgba(37, 99, 235, 0.6), 0 8px 32px rgba(0, 0, 0, 0.3);
    }

    #buzz-banner.team-b #buzz-banner-inner {
      background: linear-gradient(135deg, #f8d13e, #c9a318);
      color: #1e293b;
      box-shadow: 0 0 60px rgba(248, 209, 62, 0.6), 0 8px 32px rgba(0, 0, 0, 0.3);
    }

    @keyframes bannerFlash {
      0% {
        background: rgba(0, 0, 0, 0.5);
      }

      40% {
        background: rgba(0, 0, 0, 0.3);
      }

      100% {
        background: rgba(0, 0, 0, 0);
      }
    }

    @keyframes bannerPop {
      0% {
        transform: scale(0.3) translateY(20px);
        opacity: 0;
      }

      20% {
        transform: scale(1.1) translateY(0);
        opacity: 1;
      }

      35% {
        transform: scale(0.95);
      }

      50% {
        transform: scale(1.02);
        opacity: 1;
      }

      80% {
        opacity: 1;
      }

      100% {
        transform: scale(1);
        opacity: 0;
      }
    }

    /* ===== BACKGROUND PARTICLES ===== */
    #particles-canvas {
      position: fixed;
      inset: 0;
      z-index: 0;
      pointer-events: none;
    }

    /* ===== PASS USED CHECKBOX ===== */
    .pass-row {
      display: flex;
      align-items: center;
      gap: 5px;
      margin-top: 6px;
      cursor: pointer;
      user-select: none;
    }
    .pass-row input[type="checkbox"] {
      accent-color: var(--primary);
      width: 15px;
      height: 15px;
      cursor: pointer;
    }
    .pass-label {
      font-size: 0.6rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--text-muted);
    }

    /* ===== ACTIVE TEAM GLOW (Stage 2 rebound) ===== */
    .team-panel.active-turn {
      box-shadow: 0 0 0 3px var(--primary), var(--shadow);
      transition: box-shadow 0.3s;
    }
    .team-panel.left.active-turn {
      box-shadow: 0 0 0 3px #2563eb, 0 0 24px rgba(37,99,235,0.35);
    }
    .team-panel.right.active-turn {
      box-shadow: 0 0 0 3px var(--secondary), 0 0 24px rgba(248,209,62,0.35);
    }

    /* ===== WINNER OVERLAY ===== */
    #winner-overlay {
      position: fixed;
      inset: 0;
      z-index: 99990;
      display: none;
      align-items: center;
      justify-content: center;
      background: rgba(0,0,0,0.82);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
    }
    #winner-overlay.show {
      display: flex;
      animation: winnerBgIn 0.6s ease forwards;
    }
    @keyframes winnerBgIn {
      from { opacity: 0; }
      to   { opacity: 1; }
    }
    #winner-card {
      text-align: center;
      padding: 48px 72px;
      border-radius: 24px;
      background: linear-gradient(145deg, rgba(36,181,156,0.15) 0%, rgba(0,0,0,0.6) 100%);
      border: 2px solid rgba(36,181,156,0.3);
      box-shadow: 0 0 80px rgba(36,181,156,0.2), 0 16px 48px rgba(0,0,0,0.5);
      animation: winnerCardPop 0.8s cubic-bezier(0.16,1,0.3,1) forwards;
    }
    @keyframes winnerCardPop {
      0%   { transform: scale(0.5) translateY(40px); opacity: 0; }
      100% { transform: scale(1) translateY(0); opacity: 1; }
    }
    #winner-card .trophy {
      font-size: 5rem;
      line-height: 1;
      margin-bottom: 12px;
      animation: trophyBounce 1.2s ease infinite alternate;
    }
    @keyframes trophyBounce {
      0%   { transform: translateY(0) scale(1); }
      100% { transform: translateY(-8px) scale(1.05); }
    }
    #winner-card .winner-label {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(1.2rem, 3vw, 2rem);
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.5);
      margin-bottom: 8px;
    }
    #winner-card .winner-name {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(3rem, 7vw, 6rem);
      letter-spacing: 0.08em;
      line-height: 1;
      margin-bottom: 16px;
    }
    #winner-card .winner-name.team-a-color {
      color: #5b9cf5;
      text-shadow: 0 0 40px rgba(37,99,235,0.6);
    }
    #winner-card .winner-name.team-b-color {
      color: #f8d13e;
      text-shadow: 0 0 40px rgba(248,209,62,0.6);
    }
    #winner-card .winner-name.tie-color {
      background: linear-gradient(90deg, #5b9cf5, #f8d13e);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    #winner-card .winner-score {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(2rem, 4vw, 3.5rem);
      color: rgba(255,255,255,0.7);
      letter-spacing: 0.05em;
    }
    #winner-card .winner-close {
      margin-top: 24px;
      background: var(--primary);
      color: white;
      border: none;
      border-radius: 10px;
      padding: 10px 32px;
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.1rem;
      letter-spacing: 0.12em;
      cursor: pointer;
      transition: transform 0.15s;
    }
    #winner-card .winner-close:hover {
      transform: translateY(-2px);
    }

    /* ===== RESET TOURNAMENT BUTTON (bottom-left) ===== */
    #reset-btn {
      position: fixed;
      bottom: 10px;
      left: 12px;
      font-size: 0.55rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--text-muted);
      background: transparent;
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 3px 10px;
      cursor: pointer;
      z-index: 100;
      opacity: 0.5;
      transition: opacity 0.2s;
    }
    #reset-btn:hover {
      opacity: 1;
    }
  </style>
</head>

<body>

  <!-- ==============================================
       THREE.JS (shared by intro + logo)
       ============================================== -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

  <!-- ==============================================
       3D INTRO SCRIPT
       ============================================== -->
  <script>
    (function () {
      'use strict';

      const canvas = document.getElementById('intro-canvas');
      const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: false });
      renderer.setSize(window.innerWidth, window.innerHeight);
      renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
      renderer.setClearColor(0x030014);
      renderer.toneMapping = THREE.ACESFilmicToneMapping;
      renderer.toneMappingExposure = 1.2;

      const scene = new THREE.Scene();
      const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 2000);
      camera.position.set(0, 0, 3.2);

      // ---- STARFIELD ----
      const starCount = 2500;
      const starGeo = new THREE.BufferGeometry();
      const starPos = new Float32Array(starCount * 3);
      const starSizes = new Float32Array(starCount);
      for (let i = 0; i < starCount; i++) {
        const r = 50 + Math.random() * 450;
        const theta = Math.random() * Math.PI * 2;
        const phi = Math.acos(2 * Math.random() - 1);
        starPos[i * 3] = r * Math.sin(phi) * Math.cos(theta);
        starPos[i * 3 + 1] = r * Math.sin(phi) * Math.sin(theta);
        starPos[i * 3 + 2] = r * Math.cos(phi);
        starSizes[i] = Math.random() * 2 + 0.5;
      }
      starGeo.setAttribute('position', new THREE.BufferAttribute(starPos, 3));
      starGeo.setAttribute('size', new THREE.BufferAttribute(starSizes, 1));

      const starMat = new THREE.PointsMaterial({
        color: 0xffffff,
        size: 1.5,
        sizeAttenuation: true,
        transparent: true,
        opacity: 0.8,
      });
      const stars = new THREE.Points(starGeo, starMat);
      scene.add(stars);

      // ---- EARTH ----
      const textureLoader = new THREE.TextureLoader();

      const earthGeo = new THREE.SphereGeometry(1, 64, 64);
      const earthMat = new THREE.MeshPhongMaterial({
        color: 0x2255aa,
        emissive: 0x112244,
        shininess: 25,
        transparent: false,
      });
      const earth = new THREE.Mesh(earthGeo, earthMat);
      scene.add(earth);

      textureLoader.load(
        'https://unpkg.com/three-globe@2.31.1/example/img/earth-blue-marble.jpg',
        function (texture) {
          earthMat.map = texture;
          earthMat.color.set(0xffffff);
          earthMat.emissive.set(0x111111);
          earthMat.needsUpdate = true;
        },
        undefined,
        function () {
          console.warn('Earth texture fallback');
        }
      );

      textureLoader.load(
        'https://unpkg.com/three-globe@2.31.1/example/img/earth-topology.png',
        function (bumpTex) {
          earthMat.bumpMap = bumpTex;
          earthMat.bumpScale = 0.04;
          earthMat.needsUpdate = true;
        }
      );

      // ---- ATMOSPHERE GLOW ----
      const atmosGeo = new THREE.SphereGeometry(1.05, 64, 64);
      const atmosMat = new THREE.ShaderMaterial({
        vertexShader: `
          varying vec3 vNormal;
          varying vec3 vPosition;
          void main() {
            vNormal = normalize(normalMatrix * normal);
            vPosition = (modelViewMatrix * vec4(position, 1.0)).xyz;
            gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
          }
        `,
        fragmentShader: `
          varying vec3 vNormal;
          varying vec3 vPosition;
          void main() {
            float intensity = pow(0.72 - dot(vNormal, vec3(0.0, 0.0, 1.0)), 2.5);
            vec3 color = vec3(0.14, 0.71, 0.61);
            gl_FragColor = vec4(color, intensity * 0.65);
          }
        `,
        blending: THREE.AdditiveBlending,
        side: THREE.BackSide,
        transparent: true,
        depthWrite: false,
      });
      const atmosphere = new THREE.Mesh(atmosGeo, atmosMat);
      scene.add(atmosphere);

      // ---- OUTER GLOW (larger) ----
      const outerGlowGeo = new THREE.SphereGeometry(1.18, 64, 64);
      const outerGlowMat = new THREE.ShaderMaterial({
        vertexShader: `
          varying vec3 vNormal;
          void main() {
            vNormal = normalize(normalMatrix * normal);
            gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
          }
        `,
        fragmentShader: `
          varying vec3 vNormal;
          void main() {
            float intensity = pow(0.5 - dot(vNormal, vec3(0.0, 0.0, 1.0)), 3.0);
            vec3 color = vec3(0.08, 0.45, 0.55);
            gl_FragColor = vec4(color, intensity * 0.3);
          }
        `,
        blending: THREE.AdditiveBlending,
        side: THREE.BackSide,
        transparent: true,
        depthWrite: false,
      });
      const outerGlow = new THREE.Mesh(outerGlowGeo, outerGlowMat);
      scene.add(outerGlow);

      // ---- LIGHTING ----
      const ambientLight = new THREE.AmbientLight(0x334466, 0.6);
      scene.add(ambientLight);

      const sunLight = new THREE.DirectionalLight(0xfff5e0, 1.8);
      sunLight.position.set(5, 3, 5);
      scene.add(sunLight);

      const rimLight = new THREE.DirectionalLight(0x4ae8cc, 0.4);
      rimLight.position.set(-3, -1, -3);
      scene.add(rimLight);

      // ---- MARKER at (32.042355, 35.900693) ----
      const TARGET_LAT = 32.042355;
      const TARGET_LON = 35.900693;

      function latLonToVec3(lat, lon, radius) {
        const phi = (90 - lat) * (Math.PI / 180);
        const theta = (lon + 180) * (Math.PI / 180);
        return new THREE.Vector3(
          -radius * Math.sin(phi) * Math.cos(theta),
          radius * Math.cos(phi),
          radius * Math.sin(phi) * Math.sin(theta)
        );
      }

      const markerPos3D = latLonToVec3(TARGET_LAT, TARGET_LON, 1.02);

      const markerGeo = new THREE.SphereGeometry(0.018, 16, 16);
      const markerMat = new THREE.MeshBasicMaterial({
        color: 0x4ae8cc,
        transparent: true,
        opacity: 0,
      });
      const marker3D = new THREE.Mesh(markerGeo, markerMat);
      marker3D.position.copy(markerPos3D);
      earth.add(marker3D);

      const ringGeo = new THREE.RingGeometry(0.025, 0.035, 32);
      const ringMat = new THREE.MeshBasicMaterial({
        color: 0x4ae8cc,
        transparent: true,
        opacity: 0,
        side: THREE.DoubleSide
      });
      const markerRing = new THREE.Mesh(ringGeo, ringMat);
      markerRing.position.copy(markerPos3D);
      markerRing.lookAt(new THREE.Vector3(0, 0, 0));
      earth.add(markerRing);

      // ---- ANIMATION STATE ----
      let phase = 'intro';
      let elapsed = 0;
      const INTRO_DURATION = 3.0;
      const ZOOM_DURATION = 3.0;
      const clock = new THREE.Clock();

      earth.position.set(0.6, 0, 0);
      atmosphere.position.copy(earth.position);
      outerGlow.position.copy(earth.position);

      const camStartPos = new THREE.Vector3(0, 0, 3.2);
      const camStartLookAt = new THREE.Vector3(0.6, 0, 0);

      const markerTheta = Math.atan2(markerPos3D.x, markerPos3D.z);
      const targetEarthRotY = -markerTheta;

      function getMarkerWorldPosAtRotation(rotY) {
        const cosR = Math.cos(rotY);
        const sinR = Math.sin(rotY);
        const x = markerPos3D.x * cosR + markerPos3D.z * sinR;
        const y = markerPos3D.y;
        const z = -markerPos3D.x * sinR + markerPos3D.z * cosR;
        return new THREE.Vector3(x + earth.position.x, y + earth.position.y, z + earth.position.z);
      }

      const finalMarkerWorldPos = getMarkerWorldPosAtRotation(targetEarthRotY);
      const markerNormal = finalMarkerWorldPos.clone().sub(earth.position).normalize();
      const camEndPos = earth.position.clone().add(markerNormal.clone().multiplyScalar(1.65));
      const camEndLookAt = finalMarkerWorldPos.clone();

      function easeInOutCubic(t) {
        return t < 0.5 ? 4 * t * t * t : 1 - Math.pow(-2 * t + 2, 3) / 2;
      }

      function easeOutExpo(t) {
        return t === 1 ? 1 : 1 - Math.pow(2, -10 * t);
      }

      function onResize() {
        const w = window.innerWidth;
        const h = window.innerHeight;
        camera.aspect = w / h;
        camera.updateProjectionMatrix();
        renderer.setSize(w, h);
      }
      window.addEventListener('resize', onResize);

      let introFinished = false;
      let zoomStartRotation = null;

      function animate() {
        if (introFinished) return;
        requestAnimationFrame(animate);

        const delta = clock.getDelta();
        elapsed += delta;

        if (phase === 'intro') {
          earth.rotation.y += delta * 0.25;
        }

        stars.rotation.y += delta * 0.005;
        stars.rotation.x += delta * 0.002;

        if (phase === 'intro' && elapsed >= INTRO_DURATION) {
          phase = 'zoom';
          elapsed = 0;
          zoomStartRotation = earth.rotation.y;

          document.getElementById('coord-display').classList.add('show');

          markerMat.opacity = 1;
          ringMat.opacity = 0.8;
        }

        if (phase === 'zoom') {
          const t = Math.min(elapsed / ZOOM_DURATION, 1);
          const eased = easeInOutCubic(t);

          let rotDiff = targetEarthRotY - zoomStartRotation;
          while (rotDiff > Math.PI) rotDiff -= Math.PI * 2;
          while (rotDiff < -Math.PI) rotDiff += Math.PI * 2;
          earth.rotation.y = zoomStartRotation + rotDiff * eased;

          camera.position.lerpVectors(camStartPos, camEndPos, eased);

          const lookTarget = new THREE.Vector3();
          lookTarget.lerpVectors(camStartLookAt, camEndLookAt, eased);
          camera.lookAt(lookTarget);

          const ringScale = 1 + Math.sin(elapsed * 6) * 0.3;
          markerRing.scale.set(ringScale, ringScale, 1);

          if (t >= 1) {
            phase = 'done';
            finishIntro();
          }
        }

        atmosphere.position.copy(earth.position);
        atmosphere.rotation.copy(earth.rotation);
        outerGlow.position.copy(earth.position);

        renderer.render(scene, camera);
      }

      animate();

      function finishIntro() {
        introFinished = true;

        setTimeout(() => {
          const overlay = document.getElementById('intro-overlay');
          overlay.classList.add('fade-out');

          const mainWebsite = document.getElementById('main-website');

          setTimeout(() => {
            mainWebsite.classList.add('revealed');
            document.body.style.overflow = '';
          }, 300);

          setTimeout(() => {
            overlay.classList.add('hidden');
            renderer.dispose();
          }, 1500);
        }, 600);
      }

      document.getElementById('intro-overlay').addEventListener('click', function () {
        if (phase !== 'done') {
          phase = 'done';
          finishIntro();
        }
      });

    })();
  </script>

      camera.position.set(0, 0, 5);

      const root = new THREE.Group();
      scene.add(root);

      const brandMaterial = new THREE.MeshBasicMaterial({
        color: 0x1a8a76
      });

      let isRotating = false;
      let rotStart = { x: 0, y: 0 };
      let rotCurrent = { x: 0, y: 0.3 };

      canvas.addEventListener('mousedown', e => {
        isRotating = true;
        rotStart = { x: e.clientX - rotCurrent.y * 200, y: e.clientY - rotCurrent.x * 200 };
        e.preventDefault();
      });
      document.addEventListener('mousemove', e => {
        if (!isRotating) return;
        rotCurrent.y = (e.clientX - rotStart.x) / 200;
        rotCurrent.x = (e.clientY - rotStart.y) / 200;
      });
      document.addEventListener('mouseup', () => { isRotating = false; });

      const loaderScript = document.createElement('script');
      loaderScript.src = 'https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js';
      loaderScript.onload = function () {
        const loader = new THREE.GLTFLoader();
        loader.load('logo.glb', function (gltf) {
          const model = gltf.scene;

          model.traverse(function (obj) {
            if (obj.isMesh) {
              obj.material = brandMaterial;
            }
          });

          const box = new THREE.Box3().setFromObject(model);
          const center = box.getCenter(new THREE.Vector3());
          const size = box.getSize(new THREE.Vector3());
          const maxDim = Math.max(size.x, size.y, size.z);
          model.position.sub(center);
          model.scale.setScalar(4.2 / maxDim);
          root.add(model);

          const fov = camera.fov * (Math.PI / 180);
          camera.position.z = (4.2 / (2 * Math.tan(fov / 2))) * 1.15;
          camera.updateProjectionMatrix();
        }, undefined, function (err) {
          console.warn('GLB load error:', err);
          const fallback = new THREE.Mesh(
            new THREE.CylinderGeometry(1, 1, 0.4, 6),
            brandMaterial
          );
          root.add(fallback);
        });
      };
      document.head.appendChild(loaderScript);

      (function loop() {
        requestAnimationFrame(loop);
        root.rotation.x = rotCurrent.x;
        root.rotation.y = rotCurrent.y;
        renderer.render(scene, camera);
      })();
    })();
  </script>

  <!-- ==============================================
       GAME LOGIC (FULLY REFACTORED)
       ============================================== -->
  <script>
    // ================================================================
    //  STATE
    // ================================================================
    let questionsR1 = [];
    let questionsR2 = [];
    let allQuestions = [];
    let currentQuestion = null;
    let roundNum = 0;
    let scoreA = 0, scoreB = 0;
    let currentStage = 1;
    let questionVisible = false;
    let answerVisible = false;
    let answerLocked = false;
    let timerInterval = null;
    let timerSeconds = 20;
    const QUESTION_TIMER = 20;
    const BUZZER_TIMER = 7;

    // --- Stage 2 rebound state ---
    let activeBuzzTeam = null;  // 'a' or 'b' — who currently has the buzzer turn

    // ================================================================
    //  [NEW] QUESTION TEXT FORMATTER
    //  - Lowercases the question, then capitalizes only the first letter
    //    of the first word.
    //  - Preserves ALL-CAPS acronyms (2+ uppercase letters) like CSP, PV, DNI,
    //    MPPT, HTF, LID, PID, SPD, DC, AC, MW, I–V, p–n, etc.
    //  - Preserves hyphenated tokens (bypass words like "p–n" or "I–V" stay
    //    whole and preserve their original casing).
    // ================================================================
    function formatQuestionText(str) {
      if (!str) return '';
      // Split into tokens keeping whitespace as separators so we can preserve spacing
      const tokens = str.split(/(\s+)/);
      let firstWordHandled = false;
      const processed = tokens.map(tok => {
        if (/^\s+$/.test(tok) || tok === '') return tok;
        // Count consecutive A-Z letters (ignoring punctuation between)
        const letters = tok.match(/[A-Za-z]/g) || [];
        const upperLetters = tok.match(/[A-Z]/g) || [];
        const isAcronym = letters.length >= 2 && upperLetters.length === letters.length;
        // If it's ALL-CAPS letters only (acronym), keep as-is.
        if (isAcronym) {
          if (!firstWordHandled) firstWordHandled = true;
          return tok;
        }
        // Otherwise lowercase it
        let lower = tok.toLowerCase();
        // First non-space word: uppercase its first letter (the first alphabetic char)
        if (!firstWordHandled) {
          firstWordHandled = true;
          lower = lower.replace(/([a-z])/, (m) => m.toUpperCase());
        }
        return lower;
      });
      return processed.join('');
    }

    // ================================================================
    //  PERSISTENT QUESTION TRACKING (localStorage)
    // ================================================================
    const LS_KEY = 'askedQuestions';

    function getAskedQuestions() {
      try {
        const raw = localStorage.getItem(LS_KEY);
        return raw ? JSON.parse(raw) : [];
      } catch (e) { return []; }
    }

    function saveAskedQuestion(questionText) {
      const arr = getAskedQuestions();
      arr.push(questionText);
      localStorage.setItem(LS_KEY, JSON.stringify(arr));
    }

    function isQuestionAsked(questionText) {
      return getAskedQuestions().includes(questionText);
    }

    /** Clear localStorage pool and reset in-memory state. Callable from console or UI. */
    function resetTournament() {
      localStorage.removeItem(LS_KEY);
      roundNum = 0;
      document.getElementById('round-num').textContent = roundNum;
      console.log('[AEE] Tournament question pool reset.');
    }

    // ================================================================
    //  PARSE TEXT FILE FORMATS
    // ================================================================

    // Stage 1: Multiple Choice — Q: / 1: / 2: / 3: / 4: / A:
    function parseMCFile(text) {
      const questions = [];
      const lines = text.split('\n');
      let currentQ = null;
      for (let raw of lines) {
        const line = raw.trim();
        if (line.toUpperCase().startsWith('Q:')) {
          currentQ = { question: line.slice(2).trim(), options: ['', '', '', ''], correctIndex: 0 };
        } else if (/^1:/.test(line) && currentQ) {
          currentQ.options[0] = line.slice(2).trim();
        } else if (/^2:/.test(line) && currentQ) {
          currentQ.options[1] = line.slice(2).trim();
        } else if (/^3:/.test(line) && currentQ) {
          currentQ.options[2] = line.slice(2).trim();
        } else if (/^4:/.test(line) && currentQ) {
          currentQ.options[3] = line.slice(2).trim();
        } else if (line.toUpperCase().startsWith('A:') && currentQ) {
          currentQ.correctIndex = parseInt(line.slice(2).trim(), 10);
          questions.push(currentQ);
          currentQ = null;
        }
      }
      return questions;
    }

    // Stage 2: Classic Q/A — Q: / A:
    function parseQAFile(text) {
      const questions = [];
      const lines = text.split('\n');
      let currentQ = null;
      for (let raw of lines) {
        const line = raw.trim();
        if (line.toUpperCase().startsWith('Q:')) {
          currentQ = { question: line.slice(2).trim(), answer: '' };
        } else if (line.toUpperCase().startsWith('A:') && currentQ) {
          currentQ.answer = line.slice(2).trim();
          questions.push(currentQ);
          currentQ = null;
        }
      }
      return questions;
    }

    // ================================================================
    //  LOAD QUESTIONS FROM TEXT FILES
    // ================================================================
    async function loadQuestions() {
      const fallbackMC = [
        { question: "What is the unit of electrical power?", options: ["Volt", "Watt", "Ampere", "Ohm"], correctIndex: 2 },
        { question: "Which planet is closest to the Sun?", options: ["Venus", "Mercury", "Mars", "Earth"], correctIndex: 2 },
      ];
      const fallbackQA = [
        { question: "What does PV stand for?", answer: "Photovoltaic" },
        { question: "What is the chemical symbol for water?", answer: "H₂O" },
      ];

      try {
        const r1 = await fetch('round1.txt');
        if (r1.ok) questionsR1 = parseMCFile(await r1.text());
      } catch (e) { }

      try {
        const r2 = await fetch('round2.txt');
        if (r2.ok) questionsR2 = parseQAFile(await r2.text());
      } catch (e) { }

      if (questionsR1.length === 0) questionsR1 = fallbackMC;
      if (questionsR2.length === 0) questionsR2 = fallbackQA;

      allQuestions = questionsR1;
      pickNextQuestion();
    }

    // ================================================================
    //  QUESTION SELECTION (localStorage-backed dedup)
    // ================================================================
    function pickNextQuestion() {
      const pool = allQuestions;
      const asked = getAskedQuestions();

      // Build list of un-asked indices
      let available = [];
      for (let i = 0; i < pool.length; i++) {
        if (!asked.includes(pool[i].question)) {
          available.push(i);
        }
      }

      // If all exhausted, the pool is empty — still pick randomly (full cycle done)
      if (available.length === 0) {
        available = pool.map((_, i) => i);
        console.log('[AEE] All questions in this stage have been asked. Cycling from full pool.');
      }

      const idx = available[Math.floor(Math.random() * available.length)];
      currentQuestion = pool[idx];
      questionVisible = false;
      answerVisible = false;
      answerLocked = false;
    }

    function nextQuestion() {
      stopTimer();
      clearActiveTurnGlow();
      activeBuzzTeam = null;
      pickNextQuestion();
      document.getElementById('question-waiting').style.display = 'flex';
      document.getElementById('question-text').style.display = 'none';
      document.getElementById('answer-reveal').style.display = 'none';
      document.getElementById('options-grid').classList.remove('show');
      document.getElementById('timer-wrap').style.display = 'none';
      const disp = document.getElementById('timer-display');
      const bar = document.getElementById('timer-bar');
      disp.classList.remove('urgent');
      bar.classList.remove('urgent');
      bar.style.width = '100%';
      disp.textContent = QUESTION_TIMER;
      document.getElementById('timer-label').textContent = 'Time Remaining';
      resetOptionButtons();
    }

    function resetOptionButtons() {
      for (let i = 1; i <= 4; i++) {
        const btn = document.getElementById('opt-' + i);
        btn.classList.remove('correct', 'wrong', 'dimmed');
      }
    }

    // ================================================================
    //  STAGE
    // ================================================================
    function setStage(n) {
      currentStage = n;
      document.getElementById('stage1-btn').classList.toggle('active', n === 1);
      document.getElementById('stage2-btn').classList.toggle('active', n === 2);
      document.getElementById('round-stage').textContent = n;
      allQuestions = n === 1 ? questionsR1 : questionsR2;
      roundNum = 0;
      document.getElementById('round-num').textContent = roundNum;
      pickNextQuestion();
      nextQuestion();
    }

    // ================================================================
    //  T → SHOW QUESTION + START TIMER + INCREMENT ROUND
    // ================================================================
    function showQuestion() {
      if (!currentQuestion || questionVisible) return;
      questionVisible = true;
      answerLocked = false;

      // Persist this question to localStorage immediately
      saveAskedQuestion(currentQuestion.question);

      roundNum++;
      document.getElementById('round-num').textContent = roundNum;

      document.getElementById('question-waiting').style.display = 'none';
      document.getElementById('answer-reveal').style.display = 'none';
      answerVisible = false;
      const qt = document.getElementById('question-text');
      // [UPGRADED] use smart formatter: first letter uppercase, rest lowercase,
      // but acronyms (CSP, PV, DNI, MPPT, etc.) stay capitalized.
      const formatted = formatQuestionText(currentQuestion.question);
      qt.textContent = formatted;
      // [UPGRADED] auto-shrink for long questions so they always fit on screen.
      qt.classList.remove('long', 'very-long');
      const len = formatted.length;
      if (len > 160) qt.classList.add('very-long');
      else if (len > 100) qt.classList.add('long');
      qt.style.display = 'block';
      qt.style.opacity = 0;
      requestAnimationFrame(() => { qt.style.opacity = 1; });

      // Stage 1: Show MC options
      if (currentStage === 1 && currentQuestion.options) {
        const grid = document.getElementById('options-grid');
        resetOptionButtons();
        for (let i = 1; i <= 4; i++) {
          const btn = document.getElementById('opt-' + i);
          btn.querySelector('.opt-text').textContent = currentQuestion.options[i - 1];
        }
        grid.classList.add('show');
      } else {
        document.getElementById('options-grid').classList.remove('show');
      }

      document.getElementById('timer-label').textContent = 'Time Remaining';
      startTimer(QUESTION_TIMER);
    }

    // ================================================================
    //  STAGE 1: HANDLE MC ANSWER (keys 1-4)
    // ================================================================
    function handleMCAnswer(chosenNum) {
      if (!questionVisible || answerLocked || currentStage !== 1) return;
      if (!currentQuestion || !currentQuestion.options) return;
      answerLocked = true;

      stopTimer();

      const correctNum = currentQuestion.correctIndex;
      const isCorrect = chosenNum === correctNum;

      document.getElementById('opt-' + correctNum).classList.add('correct');

      if (!isCorrect) {
        document.getElementById('opt-' + chosenNum).classList.add('wrong');
      }

      for (let i = 1; i <= 4; i++) {
        if (i !== correctNum && i !== chosenNum) {
          document.getElementById('opt-' + i).classList.add('dimmed');
        }
      }

      if (isCorrect) {
        showCorrect();
      } else {
        showWrongX();
      }
    }

    // ================================================================
    //  G → PASS / RESTART 20s TIMER (Stage 1)
    // ================================================================
    function handlePass() {
      if (!questionVisible) return;
      stopTimer();
      document.getElementById('timer-label').textContent = 'Time Remaining (Pass)';
      startTimer(QUESTION_TIMER);
    }

    // ================================================================
    //  Y → REVEAL ANSWER (Stage 2 only)
    // ================================================================
    function showAnswer() {
      if (!questionVisible || answerVisible) return;
      if (currentStage !== 2) return;
      answerVisible = true;
      stopTimer();
      clearActiveTurnGlow();
      const ar = document.getElementById('answer-reveal');
      const ans = currentQuestion.answer || '—';
      ar.textContent = '✔ ' + ans;
      ar.style.display = 'block';
      playRevealSound();
    }

    // ================================================================
    //  H → REBOUND (Stage 2): stop 7s, toggle team, start fresh 7s
    // ================================================================
    function handleRebound() {
      if (!questionVisible || currentStage !== 2) return;
      if (!activeBuzzTeam) return; // must have an active buzzer first

      stopTimer();

      // Toggle active team
      const opponent = activeBuzzTeam === 'a' ? 'b' : 'a';
      activeBuzzTeam = opponent;

      // Update glow
      clearActiveTurnGlow();
      setActiveTurnGlow(opponent);

      // Visual feedback
      flashBuzzer('team-' + opponent);
      animateBuzzIndicator('buzz-' + opponent);

      // Label update
      const nameEl = document.getElementById(opponent === 'a' ? 'team-a-name' : 'team-b-name');
      document.getElementById('timer-label').textContent = (nameEl.value || (opponent === 'a' ? 'TEAM ALPHA' : 'TEAM BRAVO')) + ' — Rebound';

      startTimer(BUZZER_TIMER);
    }

    // ================================================================
    //  ACTIVE TEAM GLOW HELPERS
    // ================================================================
    function setActiveTurnGlow(team) {
      const panels = document.querySelectorAll('.team-panel');
      panels.forEach(p => p.classList.remove('active-turn'));
      if (team === 'a') {
        document.querySelector('.team-panel.left').classList.add('active-turn');
      } else if (team === 'b') {
        document.querySelector('.team-panel.right').classList.add('active-turn');
      }
    }
    function clearActiveTurnGlow() {
      document.querySelectorAll('.team-panel').forEach(p => p.classList.remove('active-turn'));
    }

    // ================================================================
    //  M → WINNER DECLARATION
    // ================================================================
    function showWinner() {
      const nameA = document.getElementById('team-a-name').value || 'TEAM ALPHA';
      const nameB = document.getElementById('team-b-name').value || 'TEAM BRAVO';
      const overlay = document.getElementById('winner-overlay');
      const nameEl = document.getElementById('winner-name-text');
      const scoreEl = document.getElementById('winner-score-text');

      nameEl.classList.remove('team-a-color', 'team-b-color', 'tie-color');

      if (scoreA > scoreB) {
        nameEl.textContent = nameA;
        nameEl.classList.add('team-a-color');
        scoreEl.textContent = scoreA + ' — ' + scoreB;
      } else if (scoreB > scoreA) {
        nameEl.textContent = nameB;
        nameEl.classList.add('team-b-color');
        scoreEl.textContent = scoreA + ' — ' + scoreB;
      } else {
        nameEl.textContent = "IT'S A TIE!";
        nameEl.classList.add('tie-color');
        scoreEl.textContent = scoreA + ' — ' + scoreB;
      }

      overlay.classList.remove('show');
      void overlay.offsetWidth;
      overlay.classList.add('show');
      playCorrectSound();
    }

    function closeWinnerOverlay() {
      document.getElementById('winner-overlay').classList.remove('show');
    }

    // ================================================================
    //  TIMER
    // ================================================================
    function startTimer(duration) {
      const total = duration || QUESTION_TIMER;
      timerSeconds = total;
      const wrap = document.getElementById('timer-wrap');
      const disp = document.getElementById('timer-display');
      const bar = document.getElementById('timer-bar');
      wrap.style.display = 'flex';
      disp.textContent = timerSeconds;
      disp.classList.remove('urgent');
      bar.classList.remove('urgent');
      bar.style.transition = 'none';
      bar.style.width = '100%';
      clearInterval(timerInterval);
      timerInterval = setInterval(() => {
        timerSeconds--;
        disp.textContent = timerSeconds;
        const pct = (timerSeconds / total) * 100;
        bar.style.transition = 'width 0.95s linear, background 0.3s';
        bar.style.width = pct + '%';
        if (timerSeconds <= 3) {
          disp.classList.add('urgent');
          bar.classList.add('urgent');
          playTickSound();
        }
        if (timerSeconds <= 0) {
          clearInterval(timerInterval);
          disp.textContent = '0';
          bar.style.width = '0%';
          playTimeUpSound();
        }
      }, 1000);
    }
    function stopTimer() { clearInterval(timerInterval); }

    // ================================================================
    //  SCORE
    // ================================================================
    function updateScore(team, delta) {
      if (team === 'a') {
        scoreA += delta;
        const el = document.getElementById('score-a');
        el.textContent = scoreA;
        el.classList.toggle('negative', scoreA < 0);
        bumpAnim(el);
      } else {
        scoreB += delta;
        const el = document.getElementById('score-b');
        el.textContent = scoreB;
        el.classList.toggle('negative', scoreB < 0);
        bumpAnim(el);
      }
      if (delta > 0) playScoreUpSound();
      else playScoreDownSound();
    }

    function bumpAnim(el) {
      el.classList.add('bump');
      setTimeout(() => el.classList.remove('bump'), 200);
    }

    // ================================================================
    //  KEYBOARD
    // ================================================================
    document.addEventListener('keydown', (e) => {
      // Don't process keys during intro
      if (document.getElementById('intro-overlay') && !document.getElementById('intro-overlay').classList.contains('hidden')) return;
      // Close winner overlay on Escape
      if (e.key === 'Escape') { closeWinnerOverlay(); return; }

      if (e.target.tagName === 'INPUT' && e.target.classList.contains('team-name-input')) return;
      if (e.target.contentEditable === 'true' && e.key.length === 1 && !e.ctrlKey && !e.metaKey) return;

      switch (e.key.toLowerCase()) {
        case 't': e.preventDefault(); showQuestion(); break;
        case 'y': showAnswer(); break;
        case 'v': showCorrect(); break;
        case 'g': e.preventDefault(); handlePass(); break;
        case 'h': e.preventDefault(); handleRebound(); break;
        case 'm': e.preventDefault(); showWinner(); break;
        case 'q': updateScore('a', -1); break;
        case 'w': updateScore('a', +1); break;
        case 'o': updateScore('b', -1); break;
        case 'p': updateScore('b', +1); break;
        case 'x': showWrongX(); break;
        case ' ': e.preventDefault(); nextQuestion(); break;
        case 'a': e.preventDefault(); handleBuzz('a'); break;
        case 'b': e.preventDefault(); handleBuzz('b'); break;
        // MC answer keys (Stage 1 only)
        case '1': if (currentStage === 1) { e.preventDefault(); handleMCAnswer(1); } break;
        case '2': if (currentStage === 1) { e.preventDefault(); handleMCAnswer(2); } break;
        case '3': if (currentStage === 1) { e.preventDefault(); handleMCAnswer(3); } break;
        case '4': if (currentStage === 1) { e.preventDefault(); handleMCAnswer(4); } break;
      }
    });

    // ================================================================
    //  WRONG X
    // ================================================================
    let xTimeout;
    function showWrongX() {
      playWrongSound();
      const overlay = document.getElementById('x-overlay');
      overlay.classList.remove('show');
      void overlay.offsetWidth;
      overlay.classList.add('show');
      clearTimeout(xTimeout);
      xTimeout = setTimeout(() => overlay.classList.remove('show'), 1400);
    }

    // ================================================================
    //  CORRECT CHECK  (V key)
    // ================================================================
    let checkTimeout;
    function showCorrect() {
      playCorrectSound();
      const overlay = document.getElementById('check-overlay');
      overlay.classList.remove('show');
      void overlay.offsetWidth;
      overlay.classList.add('show');
      clearTimeout(checkTimeout);
      checkTimeout = setTimeout(() => overlay.classList.remove('show'), 1400);
    }

    // ================================================================
    //  SOUNDS
    // ================================================================
    let audioCtx;
    function getCtx() {
      if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      return audioCtx;
    }

    function playWrongSound() {
      const ctx = getCtx();
      const master = ctx.createGain();
      master.gain.setValueAtTime(2.5, ctx.currentTime);
      master.connect(ctx.destination);
      const o1 = ctx.createOscillator(); const g1 = ctx.createGain();
      o1.connect(g1); g1.connect(master); o1.type = 'sawtooth';
      for (let i = 0; i < 16; i++) o1.frequency.setValueAtTime(i % 2 === 0 ? 115 : 105, ctx.currentTime + i * 0.055);
      g1.gain.setValueAtTime(0.75, ctx.currentTime);
      g1.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 1.0);
      o1.start(ctx.currentTime); o1.stop(ctx.currentTime + 1.05);
      const o2 = ctx.createOscillator(); const g2 = ctx.createGain();
      o2.connect(g2); g2.connect(master); o2.type = 'square'; o2.frequency.value = 58;
      g2.gain.setValueAtTime(0.5, ctx.currentTime);
      g2.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.95);
      o2.start(ctx.currentTime); o2.stop(ctx.currentTime + 0.98);
      const o3 = ctx.createOscillator(); const g3 = ctx.createGain();
      o3.connect(g3); g3.connect(master); o3.type = 'sawtooth';
      for (let i = 0; i < 20; i++) o3.frequency.setValueAtTime(i % 2 === 0 ? 230 : 210, ctx.currentTime + i * 0.04);
      g3.gain.setValueAtTime(0.45, ctx.currentTime);
      g3.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.85);
      o3.start(ctx.currentTime); o3.stop(ctx.currentTime + 0.9);
    }

    function playCorrectSound() {
      const ctx = getCtx();
      const master = ctx.createGain();
      master.gain.setValueAtTime(1.8, ctx.currentTime);
      master.connect(ctx.destination);
      [[523, 0], [659, 0.12], [784, 0.24]].forEach(([freq, t]) => {
        const osc = ctx.createOscillator(); const g = ctx.createGain();
        osc.connect(g); g.connect(master);
        osc.type = 'sine';
        osc.frequency.value = freq;
        g.gain.setValueAtTime(0, ctx.currentTime + t);
        g.gain.linearRampToValueAtTime(0.6, ctx.currentTime + t + 0.02);
        g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + t + 0.45);
        osc.start(ctx.currentTime + t); osc.stop(ctx.currentTime + t + 0.5);
        const osc2 = ctx.createOscillator(); const g2 = ctx.createGain();
        osc2.connect(g2); g2.connect(master);
        osc2.type = 'triangle'; osc2.frequency.value = freq * 2;
        g2.gain.setValueAtTime(0, ctx.currentTime + t);
        g2.gain.linearRampToValueAtTime(0.2, ctx.currentTime + t + 0.02);
        g2.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + t + 0.3);
        osc2.start(ctx.currentTime + t); osc2.stop(ctx.currentTime + t + 0.35);
      });
    }

    function playRevealSound() {
      const ctx = getCtx();
      [0, 0.09, 0.18].forEach((t, i) => {
        const osc = ctx.createOscillator(); const g = ctx.createGain();
        osc.connect(g); g.connect(ctx.destination);
        osc.type = 'triangle'; osc.frequency.value = 660 + i * 220;
        g.gain.setValueAtTime(0.35, ctx.currentTime + t);
        g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + t + 0.22);
        osc.start(ctx.currentTime + t); osc.stop(ctx.currentTime + t + 0.25);
      });
    }

    function playScoreUpSound() {
      const ctx = getCtx();
      [[523, 0], [659, 0.13]].forEach(([freq, t]) => {
        const osc = ctx.createOscillator(); const g = ctx.createGain();
        osc.connect(g); g.connect(ctx.destination); osc.type = 'sine'; osc.frequency.value = freq;
        g.gain.setValueAtTime(0, ctx.currentTime + t); g.gain.linearRampToValueAtTime(0.5, ctx.currentTime + t + 0.015);
        g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + t + 0.32);
        osc.start(ctx.currentTime + t); osc.stop(ctx.currentTime + t + 0.35);
        const osc2 = ctx.createOscillator(); const g2 = ctx.createGain();
        osc2.connect(g2); g2.connect(ctx.destination); osc2.type = 'triangle'; osc2.frequency.value = freq * 2;
        g2.gain.setValueAtTime(0, ctx.currentTime + t); g2.gain.linearRampToValueAtTime(0.15, ctx.currentTime + t + 0.015);
        g2.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + t + 0.25);
        osc2.start(ctx.currentTime + t); osc2.stop(ctx.currentTime + t + 0.28);
      });
    }

    function playScoreDownSound() {
      const ctx = getCtx();
      [[380, 0], [280, 0.1]].forEach(([freq, t]) => {
        const osc = ctx.createOscillator(); const g = ctx.createGain();
        osc.connect(g); g.connect(ctx.destination); osc.type = 'sine'; osc.frequency.value = freq;
        g.gain.setValueAtTime(0.3, ctx.currentTime + t);
        g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + t + 0.18);
        osc.start(ctx.currentTime + t); osc.stop(ctx.currentTime + t + 0.2);
      });
    }

    function playTickSound() {
      const ctx = getCtx();
      const osc = ctx.createOscillator(); const g = ctx.createGain();
      osc.connect(g); g.connect(ctx.destination); osc.type = 'sine'; osc.frequency.value = 900;
      g.gain.setValueAtTime(0.2, ctx.currentTime); g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.07);
      osc.start(ctx.currentTime); osc.stop(ctx.currentTime + 0.09);
    }

    function playTimeUpSound() {
      const ctx = getCtx();
      [0, 0.13, 0.26].forEach((t, i) => {
        const osc = ctx.createOscillator(); const g = ctx.createGain();
        osc.connect(g); g.connect(ctx.destination); osc.type = 'sawtooth'; osc.frequency.value = 300 - i * 60;
        g.gain.setValueAtTime(0.4, ctx.currentTime + t); g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + t + 0.18);
        osc.start(ctx.currentTime + t); osc.stop(ctx.currentTime + t + 0.2);
      });
    }

    function playBuzzerSound() {
      const ctx = getCtx();
      for (let i = 0; i < 3; i++) {
        const osc = ctx.createOscillator(); const g = ctx.createGain();
        osc.connect(g); g.connect(ctx.destination); osc.type = 'square'; osc.frequency.value = 880 + i * 220;
        g.gain.setValueAtTime(0.4, ctx.currentTime + i * 0.11);
        g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.1 + i * 0.11);
        osc.start(ctx.currentTime + i * 0.11); osc.stop(ctx.currentTime + 0.14 + i * 0.11);
      }
    }

    // ================================================================
    //  BUZZER SYSTEM
    // ================================================================
    let buzzerLocked = false;
    let bannerTimeout;

    function handleBuzz(team) {
      if (buzzerLocked) return;
      buzzerLocked = true;
      activeBuzzTeam = team;

      stopTimer();

      // Show timer label with team name
      const nameEl = document.getElementById(team === 'a' ? 'team-a-name' : 'team-b-name');
      document.getElementById('timer-label').textContent = (nameEl.value || (team === 'a' ? 'TEAM ALPHA' : 'TEAM BRAVO')) + ' — Answer';

      startTimer(BUZZER_TIMER);
      setActiveTurnGlow(team);

      flashBuzzer('team-' + team);
      animateBuzzIndicator('buzz-' + team);
      playBuzzerSound();

      showBuzzBanner(team);
    }

    function showBuzzBanner(team) {
      const banner = document.getElementById('buzz-banner');
      const inner = document.getElementById('buzz-banner-inner');
      const nameEl = document.getElementById(team === 'a' ? 'team-a-name' : 'team-b-name');
      const teamName = nameEl.value || (team === 'a' ? 'TEAM ALPHA' : 'TEAM BRAVO');

      banner.className = 'team-' + team;
      inner.textContent = '🚨 ' + teamName + ' BUZZED FIRST!';

      void banner.offsetWidth;
      banner.classList.add('show');

      clearTimeout(bannerTimeout);
      bannerTimeout = setTimeout(() => banner.classList.remove('show'), 2800);
    }

    // Reset lockout on next question
    const _origNextQuestion = nextQuestion;
    nextQuestion = function () {
      buzzerLocked = false;
      activeBuzzTeam = null;
      clearActiveTurnGlow();
      _origNextQuestion();
    };

    function flashBuzzer(cls) {
      const f = document.getElementById('buzzer-flash');
      f.className = cls; f.style.opacity = 1;
      setTimeout(() => { f.style.opacity = 0; f.className = ''; }, 500);
    }
    function animateBuzzIndicator(id) {
      const el = document.getElementById(id);
      el.classList.add('active');
      setTimeout(() => el.classList.remove('active'), 2500);
    }

    // ================================================================
    //  INIT
    // ================================================================
    window.addEventListener('load', () => {
      loadQuestions();
      document.addEventListener('click', () => getCtx(), { once: true });
      document.addEventListener('keydown', () => getCtx(), { once: true });
    });
  </script>

  <!-- ==============================================
       FLOATING PARTICLES (existing)
       ============================================== -->
  <script>
    (function () {
      const cvs = document.getElementById('particles-canvas');
      if (!cvs) return;
      const ctx2d = cvs.getContext('2d');
      let W, H;
      const PARTICLE_COUNT = 80;
      const particles = [];

      function resize() {
        W = cvs.width = window.innerWidth;
        H = cvs.height = window.innerHeight;
      }
      window.addEventListener('resize', resize);
      resize();

      for (let i = 0; i < PARTICLE_COUNT; i++) {
        particles.push({
          x: Math.random() * W,
          y: Math.random() * H,
          r: Math.random() * 3 + 1,
          vx: (Math.random() - 0.5) * 0.4,
          vy: -(Math.random() * 0.3 + 0.05),
          alpha: Math.random() * 0.35 + 0.15,
          pulse: Math.random() * Math.PI * 2
        });
      }

      function draw() {
        ctx2d.clearRect(0, 0, W, H);
        const t = performance.now() * 0.001;

        for (const p of particles) {
          p.x += p.vx;
          p.y += p.vy;

          if (p.y < -5) { p.y = H + 5; p.x = Math.random() * W; }
          if (p.x < -5) p.x = W + 5;
          if (p.x > W + 5) p.x = -5;

          const glow = p.alpha + Math.sin(t * 0.8 + p.pulse) * 0.1;

          ctx2d.shadowColor = 'rgba(36, 181, 156, 0.4)';
          ctx2d.shadowBlur = p.r * 3;

          ctx2d.beginPath();
          ctx2d.arc(p.x, p.y, p.r, 0, Math.PI * 2);
          ctx2d.fillStyle = `rgba(36, 181, 156, ${glow})`;
          ctx2d.fill();
        }

        ctx2d.shadowColor = 'transparent';
        ctx2d.shadowBlur = 0;

        requestAnimationFrame(draw);
      }
      draw();
    })();
  </script>
