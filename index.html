<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AEE Energy Transition Challenge</title>
    <style>
        :root {
            --asu-deep-blue: #0A1E3C; /* Prestigious background */
            --energy-yellow: #FFC000; /* Neon-style accent */
            --text-off-white: #EAEAEA;
            --panel-grey: #2A3648; /* Slight depth for sidebars */
        }

        body {
            background-color: var(--asu-deep-blue);
            color: var(--text-off-white);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            overflow: hidden;
            display: grid;
            grid-template-areas: 
                "header header header"
                "sidebarL main sidebarR"
                "footer footer footer";
            grid-template-columns: 200px 1fr 200px; /* Sidebar | Main | Sidebar */
            grid-template-rows: 80px 1fr 40px; /* Header | Game | Info */
            height: 100vh;
        }

        /* --- Global Elements --- */
        header { 
            grid-area: header; border-bottom: 2px solid #3A4A61;
            display: flex; align-items: center; justify-content: space-around;
        }
        h1 { font-size: 24px; color: var(--energy-yellow); margin: 0; text-transform: uppercase; letter-spacing: 2px;}
        h2 { font-size: 16px; margin: 0; opacity: 0.8;}

        footer { 
            grid-area: footer; border-top: 1px solid #3A4A61;
            display: flex; align-items: center; justify-content: center;
            font-size: 12px; font-weight: bold; text-transform: uppercase;
        }

        /* --- Dedicated Sidebar Scores --- */
        .sidebar { background: var(--panel-grey); border: 2px solid transparent; box-sizing: border-box; text-align: center;}
        .sidebar.team-a { grid-area: sidebarL; border-right: 2px solid #3A4A61; }
        .sidebar.team-b { grid-area: sidebarR; border-left: 2px solid #3A4A61; }

        .team-title { color: var(--text-off-white); font-weight: bold; margin-top: 20px; text-transform: uppercase; }
        .sidebar.active { border-color: var(--energy-yellow); box-shadow: 0 0 15px rgba(255, 192, 0, 0.4); }

        .score-display {
            font-size: 80px; font-weight: 900; color: var(--energy-yellow);
            display: flex; align-items: center; justify-content: center; height: 100%;
        }

        /* --- Main Dynamic Area --- */
        #gameArea { grid-area: main; display: flex; align-items: center; justify-content: center;}

        /* --- Layout: Title Card --- */
        .title-screen { text-align: center; }
        .title-screen p { font-size: 18px; line-height: 1.6;}

        /* --- Layout: Stage 1 (Individual QA) --- */
        .qa-container { display: flex; flex-direction: column; align-items: center; text-align: center; width: 80%;}
        .stage-indicator { font-size: 12px; text-transform: uppercase; letter-spacing: 3px; border-bottom: 1px solid;}
        .question-box { font-size: 32px; font-weight: bold; line-height: 1.4; margin: 30px 0; }
        .answer-reveal { font-size: 24px; color: var(--energy-yellow); background: rgba(0,0,0,0.3); padding: 10px; opacity: 0;}
        .revealed { opacity: 1; transition: opacity 0.5s;}

        /* --- Controls (Keyboard only) --- */
        .kb-guide { font-size: 11px; opacity: 0.5;}
    </style>
</head>
<body>

    <header>
        <h2>AEE Student Chapters Challenge</h2>
        <h1>The Great Energy Transition</h1>
        <h2>ASU Amman / 2026</h2>
    </header>

    <aside class="sidebar team-a active">
        <div class="team-title">Chapter A</div>
        <div class="score-display" id="scoreA">0</div>
    </aside>

    <aside class="sidebar team-b">
        <div class="team-title">Chapter B</div>
        <div class="score-display" id="scoreB">0</div>
    </aside>

    <main id="gameArea">
        
        <div class="title-screen" id="viewTitle">
            <h1>NATIONAL COMPETITION</h1>
            <p>Welcome, AEE Student Chapter Teams!</p>
            <p>Ready your Chapter’s Energy Auditing & Renewable Energy insights.</p>
        </div>

    </main>

    <footer>
        <span class="kb-guide">[K]=Scores | [Q]=Stage 1 | [B]=Stage 2 | [R]=Reset</span>
    </footer>

    <script>
        // Data Structure
        const competition = {
            stage1_q: [
                "Define the performance coefficient (COP) in a heat pump system.",
                "What are the main parameters optimized in a solar PV array energy audit?",
                "List three key methods for demand-side management in a commercial building.",
                "How does nanofluid integration improve heat exchanger efficiency?",
                "State the primary advantage of Geothermal power over Solar power."
            ],
            stage1_a: [
                "COP = (Heat Output) / (Work Input)",
                "Irradiance, Tilt, Soiling, Inverter efficiency, and wiring losses.",
                "Load Shifting, Valley Filling, and Peak Clipping.",
                "It increases the thermal conductivity and surface area of the heat transfer fluid.",
                "Geothermal provides consistent, non-intermittent Baseload power."
            ],
            stage2_q: [
                "Buzzer Round: What is the primary benefit of Energy Storage Systems (ESS)?",
                "Buzzer Round: What does the term 'Levelized Cost of Energy' (LCOE) mean?"
            ]
        };

        // UI State
        let currentView = 'title';
        let currentQuestion = 0;
        let pointsA = 0;
        let pointsB = 0;
        
        // Navigation Logic (Keyboard Controls)
        window.onkeydown = (e) => {
            switch (e.key.toLowerCase()) {
                // Change Layout Views
                case 't': showTitle(); break;
                case 'q': startStage1(); break;
                case 'b': startStage2(); break;

                // Game Logic within Views
                case 'arrowright': nextStageElement(); break;
                case 'a': adjustScore('A', 10); break;
                case 'z': adjustScore('A', -10); break;
                case 's': adjustScore('B', 10); break;
                case 'x': adjustScore('B', -10); break;
            }
        };

        // Function definitions
        function adjustScore(team, val) {
            if (team === 'A') pointsA += val;
            if (team === 'B') pointsB += val;
            document.getElementById('scoreA').innerText = pointsA;
            document.getElementById('scoreB').innerText = pointsB;
        }

        function showTitle() {
            // Keep scores, return to title screen view.
        }

        function startStage1() {
            // Set layout for individual QA (one big Q per page).
            currentView = 'stage1';
            currentQuestion = 0;
            updateQAView();
        }

        function startStage2() {
            // Set layout for buzzer (We will add the Ably listener here when we return to the scoreboard).
        }

        function updateQAView() {
            const main = document.getElementById('gameArea');
            const qStr = competition.stage1_q[currentQuestion];
            const aStr = competition.stage1_a[currentQuestion];

            main.innerHTML = `
                <div class="qa-container">
                    <span class="stage-indicator">STAGE 1: AUDIT CHALLENGE (Q${currentQuestion+1}/5)</span>
                    <div class="question-box">${qStr}</div>
                    <div class="answer-reveal" id="answerBox">${aStr}</div>
                </div>
            `;
        }

        function nextStageElement() {
            // Logic to either reveal the answer OR go to the next question.
            const aBox = document.getElementById('answerBox');
            if(aBox && !aBox.classList.contains('revealed')) {
                aBox.classList.add('revealed');
            } else if (currentQuestion < 4) {
                currentQuestion++;
                updateQAView();
            }
        }
    </script>
</body>
</html>
